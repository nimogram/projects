<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0d0d">
<meta name="color-scheme" content="dark">
<title>nimogram</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;forced-color-adjust:none;-webkit-print-color-adjust:exact;print-color-adjust:exact}
:root{
  --lv4:#39d353;
  --lv3:#26a641;
  --lv2:#006d32;
  --lv1:#0e4429;
  --lv0:#161b22;
  --empty:#0d1117;
  --yellow:#FFD100;
  --bg:#0d0d0d;--surface:#131313;--card:#181818;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);
  --muted:#4a4a4a;--muted2:#7a7a7a;--text:#ffffff;
  --cell-size:32px; /* overridden by JS */
  --gap:2px;
  --time-col:22px;
}
html,body{
  background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;
  height:100%;max-width:430px;margin:0 auto;overflow:hidden;
  position:fixed;width:100%;color-scheme:dark;
}

/* ── LAYOUT ── */
.screen{display:none;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}
.screen.active{display:flex}

/* ── HEADER ── */
.week-header{flex-shrink:0;background:var(--bg);padding-top:env(safe-area-inset-top,36px)}
.week-top{display:flex;justify-content:space-between;align-items:center;padding:8px 12px 7px}
.logo-block{}
.wordmark{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:0.4em;color:var(--lv4);text-transform:uppercase;margin-bottom:2px}
.week-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:0.05em;color:var(--text);line-height:1}
.week-nav{display:flex;align-items:center;gap:5px}
.week-range{font-family:'DM Mono',monospace;font-size:9px;color:var(--text);min-width:66px;text-align:center;text-transform:uppercase;letter-spacing:0.05em}
.nav-btn{width:24px;height:24px;border:0.5px solid var(--border2);background:transparent;color:var(--muted2);border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.nav-btn:active{background:rgba(255,255,255,0.1)}

/* ── DOW HEADER ── */
.dow-header{
  display:grid;
  grid-template-columns:var(--time-col) repeat(7,1fr);
  gap:var(--gap);
  padding:0 8px;
  border-bottom:0.5px solid var(--border);
  background:var(--bg);
  flex-shrink:0;
}
.dow-spacer{}
.dow-col{display:flex;flex-direction:column;align-items:center;padding:4px 0 5px}
.dow-name{font-family:'DM Mono',monospace;font-size:7px;text-transform:uppercase;color:var(--muted2);letter-spacing:0.04em}
.dow-date-num{font-family:'Bebas Neue',sans-serif;font-size:15px;line-height:1.1;color:var(--muted2)}
.dow-dot{width:3px;height:3px;border-radius:50%;background:transparent;margin-top:1px}
.dow-col.today .dow-name,.dow-col.today .dow-date-num{color:var(--yellow)}
.dow-col.today .dow-dot{background:var(--yellow)}

/* ── GRID AREA (no scroll — fits screen exactly) ── */
.grid-area{
  flex:1;
  display:grid;
  grid-template-columns:var(--time-col) repeat(7,1fr);
  grid-template-rows:repeat(12, 1fr); /* 12 hours */
  gap:var(--gap);
  padding:var(--gap) 8px 0;
  overflow:hidden; /* no scroll */
}

/* time label */
.time-label{
  font-family:'DM Mono',monospace;font-size:7px;color:var(--muted);
  display:flex;align-items:center;justify-content:flex-end;
  padding-right:3px;
}

/* SQUARE CELL — both width & height driven by grid's equal fr rows */
.week-cell{
  border-radius:3px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform 0.08s;
  min-width:0;min-height:0;
  position:relative;
}
.week-cell:active{transform:scale(0.82)}
.week-cell.now-cell{box-shadow:0 0 0 2px var(--yellow)}
.week-cell.sel-cell{box-shadow:0 0 0 2px rgba(255,255,255,0.75)}
.cell-mark{
  font-family:'DM Mono',monospace;font-weight:700;
  pointer-events:none;line-height:1;
  font-size:clamp(6px, 1.8vw, 10px);
}

/* ── LEGEND ── */
.legend{
  display:flex;align-items:center;gap:4px;
  padding:5px 10px 6px;justify-content:flex-end;
  flex-shrink:0;border-top:0.5px solid var(--border);
}
.legend-label{font-family:'DM Mono',monospace;font-size:7px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em}
.legend-box{width:10px;height:10px;border-radius:2px}

/* ── DETAIL PANEL ── */
.detail-panel{
  position:fixed;inset:0;background:var(--surface);z-index:50;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  transform:translateY(100%);
  transition:transform 0.36s cubic-bezier(0.2,1,0.3,1);
}
.detail-panel.open{transform:translateY(0)}
.detail-inner{padding:44px 20px 64px;max-width:430px;margin:0 auto}

.d-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.d-badge{font-family:'DM Mono',monospace;font-size:8px;color:var(--lv4);letter-spacing:0.4em;margin-bottom:5px}
.d-hero{display:flex;align-items:baseline;gap:10px}
.d-day{font-family:'Bebas Neue',sans-serif;font-size:64px;line-height:1;color:var(--text);letter-spacing:-2px}
.d-hour{font-family:'Bebas Neue',sans-serif;font-size:32px;line-height:1;color:var(--yellow)}
.d-meta{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted2);margin-top:3px;text-transform:uppercase;letter-spacing:0.1em}
.close-btn{width:34px;height:34px;border:0.5px solid var(--border2);background:rgba(255,255,255,0.04);color:var(--muted2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.close-btn:active{background:rgba(255,255,255,0.1)}

.sec-label{font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:0.28em;text-transform:uppercase;margin-bottom:9px}

.advisor{background:rgba(57,211,83,0.07);border:0.5px solid rgba(57,211,83,0.2);border-radius:8px;padding:10px 12px;margin-bottom:14px}
.adv-badge{font-family:'DM Mono',monospace;font-size:7px;color:#39d353;letter-spacing:0.3em;margin-bottom:3px}
.adv-text{font-size:12px;color:rgba(255,255,255,0.58);line-height:1.65;font-weight:300}

.input-card{background:var(--card);border-bottom:3px solid var(--lv4);padding:16px 13px 20px;margin-bottom:16px}
.intensity-row{display:flex;gap:6px}
.lv-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.lv-btn{width:100%;aspect-ratio:1;border:1px solid rgba(255,255,255,0.05);cursor:pointer;border-radius:5px;display:flex;align-items:center;justify-content:center;transition:transform 0.1s}
.lv-btn:active{transform:scale(0.88)}
.lv-btn.act{border:2.5px solid rgba(255,255,255,0.85);box-shadow:0 0 16px rgba(255,255,255,0.1);transform:translateY(-3px)}
.lv-btn-mark{font-size:13px;font-weight:700;line-height:1}
.lv-label{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:0.07em;text-transform:uppercase;text-align:center}

.memo-input{width:100%;min-height:84px;background:rgba(255,255,255,0.03);border:0.5px solid var(--border2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:300;padding:10px 12px;resize:none;outline:none;line-height:1.7;caret-color:var(--lv4);margin-bottom:14px}
.memo-input::placeholder{color:var(--muted)}
.save-btn{width:100%;padding:15px;background:var(--text);color:#000;border:none;cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:0.4em;display:flex;align-items:center;justify-content:center;gap:8px;transition:background 0.14s}
.save-btn:active{background:var(--lv4)}
</style>
</head>
<body>

<!-- WEEKLY SCREEN -->
<div id="screen-week" class="screen active">
  <div class="week-header">
    <div class="week-top">
      <div class="logo-block">
        <div class="wordmark">NIMOGRAM</div>
        <div class="week-title">Weekly Matrix</div>
      </div>
      <div class="week-nav">
        <button class="nav-btn" onclick="changeWeek(-1)">‹</button>
        <div class="week-range" id="week-range">—</div>
        <button class="nav-btn" onclick="changeWeek(1)">›</button>
      </div>
    </div>
    <div class="dow-header" id="dow-header"></div>
  </div>

  <!-- grid fills remaining vertical space, no scroll -->
  <div class="grid-area" id="grid-area"></div>

  <div class="legend">
    <span class="legend-label">High</span>
    <div class="legend-box" style="background:var(--lv4)"></div>
    <div class="legend-box" style="background:var(--lv3)"></div>
    <div class="legend-box" style="background:var(--lv2)"></div>
    <div class="legend-box" style="background:var(--lv1)"></div>
    <div class="legend-box" style="background:var(--lv0)"></div>
    <span class="legend-label">Low</span>
  </div>
</div>

<!-- DETAIL PANEL -->
<div id="detail-panel" class="detail-panel">
  <div class="detail-inner">
    <div class="d-top">
      <div>
        <div class="d-badge">◉ STRATEGIC LOG</div>
        <div class="d-hero">
          <div class="d-day" id="d-day">15</div>
          <div class="d-hour" id="d-hour">08:00</div>
        </div>
        <div class="d-meta" id="d-meta">MON · MARCH 2026</div>
      </div>
      <button class="close-btn" onclick="closeDetail()">✕</button>
    </div>

    <div class="advisor">
      <div class="adv-badge">🔔 ADVISOR</div>
      <div class="adv-text" id="adv-text">—</div>
    </div>

    <div class="input-card">
      <div class="sec-label" style="margin-bottom:11px">コンディション強度</div>
      <div class="intensity-row" id="intensity-row"></div>
    </div>

    <div class="sec-label">⚡ Strategic Insight</div>
    <textarea class="memo-input" id="memo-input" placeholder="HPE案件の進捗、コンディション、今日の気づきを記録..."></textarea>
    <button class="save-btn" onclick="saveAndClose()">✓ &nbsp;CONFIRM & BACK</button>
  </div>
</div>

<script>
// ── CONSTANTS ──────────────────────────────────────────────────────────────
const PAL      = {4:'#39d353',3:'#26a641',2:'#006d32',1:'#0e4429',0:'#161b22'};
const EMPTY    = '#0d1117';
const LV_MARKS = {4:'++',3:'+',2:'·',1:'−',0:''};
const LV_NAMES = {4:'Peak',3:'Good',2:'Fair',1:'Low',0:'Bad'};
const LV_TEXT  = {4:'rgba(0,0,0,0.7)',3:'rgba(0,0,0,0.6)',2:'rgba(255,255,255,0.85)',1:'rgba(255,255,255,0.7)',0:'rgba(255,255,255,0.4)'};

const DOW   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MON_S = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MON_L = ['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];

const HOURS = Array.from({length:12}, (_,i) => 8+i); // 08〜19
const N_ROWS = HOURS.length; // 12
const N_COLS = 7;
const GAP    = 2;
const TIME_W = 22;
const PAD_H  = 8; // horizontal padding each side

const ADVISOR = h => {
  if(h===8)  return '朝セット（マカ・プロテイン・豆乳コーヒー）完了ですか？今日の「攻」を開始しましょう。';
  if(h===9)  return '営業開始。HPE GreenLakeのターゲットリストを再確認。最高のアプローチを。';
  if(h===12) return '昼休憩。16時間ファスティングの解除タイミングに注意ですよ。';
  if(h===14) return '午後の山場。エンタープライズ提案にINTJ-Aのロジックを全力投入。';
  if(h===17) return '夕方の進捗確認。今日の成果をまとめ、明日の前兆を掴んでください。';
  if(h===18) return 'ラストスパート。今日の「攻」の仕上げをしましょう。';
  if(h===19) return 'お疲れ様です。帰宅後の家族時間を充実させてください。';
  return 'ニモさんの「財・体」を維持しつつ、最短成果へ一歩ずつ前進ですよ。';
};

// ── STATE ──────────────────────────────────────────────────────────────────
const NOW = new Date();
let ST = {
  weekStart: monday(NOW),
  selDs: null,
  selHour: Math.min(Math.max(NOW.getHours(), 8), 19),
  data: JSON.parse(localStorage.getItem('nimo-v5') || '{}'),
};
function persist(){ localStorage.setItem('nimo-v5', JSON.stringify(ST.data)); }

function monday(d){
  const t=new Date(d); t.setHours(0,0,0,0);
  const dw=t.getDay(); t.setDate(t.getDate()+(dw===0?-6:1-dw)); return t;
}
function ds(d){ return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`; }
function dsNow(){ return ds(NOW); }

function getSlot(dstr,h){ return ST.data[dstr]?.slots?.[h]||null; }
function setSlot(dstr,h,patch){
  if(!ST.data[dstr]) ST.data[dstr]={slots:{},memo:''};
  ST.data[dstr].slots[h]={...(ST.data[dstr].slots[h]||{}),...patch};
  persist();
}
function slotLv(dstr,h){
  const s=getSlot(dstr,h);
  return (s&&s.level!==undefined)?s.level:null;
}

// ── COMPUTE SQUARE CELL SIZE ───────────────────────────────────────────────
// cell must be square: pick the smaller of max-by-width and max-by-height
function calcCellSize(){
  const screenW = Math.min(window.innerWidth, 430);
  const screenH = window.innerHeight;

  // measure fixed chrome heights
  const header  = document.querySelector('.week-header');
  const legend  = document.querySelector('.legend');
  const headerH = header  ? header.offsetHeight  : 100;
  const legendH = legend  ? legend.offsetHeight  : 28;

  // available area for the grid-area div
  const availW = screenW - PAD_H*2 - TIME_W - GAP*(N_COLS);    // columns
  const availH = screenH - headerH - legendH - GAP*(N_ROWS-1);  // rows

  const byWidth  = Math.floor(availW / N_COLS);
  const byHeight = Math.floor(availH / N_ROWS);

  return Math.max(Math.min(byWidth, byHeight), 16); // min 16px
}

function applySize(){
  const sz = calcCellSize();
  // grid-area rows: each row = sz px, columns driven by fr
  const grid = document.getElementById('grid-area');
  if(grid){
    grid.style.gridTemplateRows = `repeat(${N_ROWS}, ${sz}px)`;
    // time col + 7 equal columns; cell width = (availW)/7 ≈ sz too
    const screenW = Math.min(window.innerWidth, 430);
    const colW = Math.floor((screenW - PAD_H*2 - TIME_W - GAP*N_COLS) / N_COLS);
    grid.style.gridTemplateColumns = `${TIME_W}px repeat(${N_COLS}, ${colW}px)`;
    // also sync dow header columns
    const dow = document.getElementById('dow-header');
    if(dow) dow.style.gridTemplateColumns = `${TIME_W}px repeat(${N_COLS}, ${colW}px)`;
  }
}

window.addEventListener('resize', ()=>{ applySize(); renderWeek(); });

// ── RENDER WEEK ────────────────────────────────────────────────────────────
function renderWeek(){
  const ws   = ST.weekStart;
  const days = Array.from({length:7},(_,i)=>{ const d=new Date(ws); d.setDate(d.getDate()+i); return d; });
  const we   = days[6];

  // range label
  document.getElementById('week-range').textContent =
    ws.getMonth()===we.getMonth()
      ?`${MON_S[ws.getMonth()]} ${ws.getDate()}–${we.getDate()}`
      :`${MON_S[ws.getMonth()]}${ws.getDate()}–${MON_S[we.getMonth()]}${we.getDate()}`;

  // DOW header
  const dowH = document.getElementById('dow-header');
  dowH.innerHTML = '<div class="dow-spacer"></div>';
  days.forEach(d=>{
    const isToday = ds(d)===dsNow();
    const col = document.createElement('div');
    col.className = 'dow-col'+(isToday?' today':'');
    col.innerHTML = `<div class="dow-name">${DOW[d.getDay()].slice(0,3)}</div><div class="dow-date-num">${d.getDate()}</div><div class="dow-dot"></div>`;
    dowH.appendChild(col);
  });

  // Grid — flat list: for each row (hour), output time-label + 7 cells
  const grid = document.getElementById('grid-area');
  grid.innerHTML = '';

  HOURS.forEach(h=>{
    // time label
    const tl = document.createElement('div');
    tl.className = 'time-label';
    tl.textContent = h;
    grid.appendChild(tl);

    days.forEach(d=>{
      const dstr  = ds(d);
      const lv    = slotLv(dstr,h);
      const isNow = ds(d)===dsNow() && NOW.getHours()===h;
      const isSel = ST.selDs===dstr && ST.selHour===h;

      const cell = document.createElement('div');
      cell.className = 'week-cell'+(isNow?' now-cell':'')+(isSel?' sel-cell':'');
      cell.style.background = lv!==null ? PAL[lv] : EMPTY;

      if(lv!==null){
        const mk = document.createElement('span');
        mk.className = 'cell-mark';
        mk.style.color = LV_TEXT[lv];
        mk.textContent = LV_MARKS[lv];
        cell.appendChild(mk);
      }

      // note indicator dot
      const slot = getSlot(dstr,h);
      if(slot?.note){
        const dot = document.createElement('div');
        dot.style.cssText='position:absolute;bottom:2px;right:2px;width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,0.7);pointer-events:none';
        cell.appendChild(dot);
      }

      cell.addEventListener('click', ()=>openDetail(d,h));
      grid.appendChild(cell);
    });
  });

  // apply square sizing after DOM is populated
  applySize();
}

// ── DETAIL ────────────────────────────────────────────────────────────────
function openDetail(dateObj, hour){
  const dstr = ds(dateObj);
  ST.selDs   = dstr;
  ST.selHour = hour;

  document.getElementById('d-day').textContent  = dateObj.getDate();
  document.getElementById('d-hour').textContent = `${hour.toString().padStart(2,'0')}:00`;
  document.getElementById('d-meta').textContent =
    `${DOW[dateObj.getDay()].toUpperCase()} · ${MON_L[dateObj.getMonth()]} ${dateObj.getFullYear()}`;
  document.getElementById('adv-text').textContent = ADVISOR(hour);
  document.getElementById('memo-input').value = ST.data[dstr]?.slots?.[hour]?.note||'';

  renderIntensity();
  document.getElementById('detail-panel').classList.add('open');
  renderWeek();
}

function closeDetail(){
  document.getElementById('detail-panel').classList.remove('open');
  renderWeek();
}

function saveAndClose(){
  const note = document.getElementById('memo-input').value;
  setSlot(ST.selDs, ST.selHour, {note});
  persist();
  closeDetail();
}

// ── INTENSITY PICKER ──────────────────────────────────────────────────────
function renderIntensity(){
  const curLv = slotLv(ST.selDs, ST.selHour);
  const row   = document.getElementById('intensity-row');
  row.innerHTML = '';

  [4,3,2,1,0].forEach(lv=>{
    const isAct = curLv===lv;
    const wrap  = document.createElement('div'); wrap.className='lv-wrap';
    const btn   = document.createElement('button');
    btn.className = 'lv-btn'+(isAct?' act':'');
    btn.style.background = PAL[lv];
    const mark = document.createElement('span');
    mark.className = 'lv-btn-mark';
    mark.style.color = isAct?'rgba(255,255,255,0.95)':LV_TEXT[lv];
    mark.textContent = LV_MARKS[lv];
    btn.appendChild(mark);
    btn.addEventListener('click',()=>{
      const newLv = curLv===lv ? null : lv;
      if(newLv===null){
        if(ST.data[ST.selDs]?.slots?.[ST.selHour]) delete ST.data[ST.selDs].slots[ST.selHour];
        persist();
      } else {
        setSlot(ST.selDs, ST.selHour, {level:newLv});
      }
      renderIntensity(); renderWeek();
    });
    const lbl = document.createElement('div');
    lbl.className='lv-label';
    lbl.textContent=LV_NAMES[lv];
    lbl.style.color=isAct?'rgba(255,255,255,0.8)':'var(--muted)';
    wrap.appendChild(btn); wrap.appendChild(lbl); row.appendChild(wrap);
  });
}

// ── NAV ───────────────────────────────────────────────────────────────────
function changeWeek(delta){
  ST.weekStart = new Date(ST.weekStart);
  ST.weekStart.setDate(ST.weekStart.getDate()+delta*7);
  renderWeek();
}

// ── INIT ──────────────────────────────────────────────────────────────────
renderWeek(); // applySize() is called inside renderWeek after DOM build
</script>
</body>
</html>
