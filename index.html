<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>nimogram</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;forced-color-adjust:none;-webkit-print-color-adjust:exact;print-color-adjust:exact}

/* ── THEME VARIABLES (overridden by JS) ── */
:root{
  --lv4:#39d353;--lv3:#26a641;--lv2:#006d32;--lv1:#0e4429;--lv0:#161b22;
  --empty:#0d1117;
  --yellow:#FFD100;
  --bg:#0d0d0d;--surface:#131313;--card:#181818;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --muted:#4a4a4a;--muted2:#7a7a7a;--text:#ffffff;--text-inv:#000000;
  --gap:2px;--time-col:22px;
}

html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100%;max-width:430px;margin:0 auto;overflow:hidden;position:fixed;width:100%}

/* ── SCREENS ── */
.screen{display:none;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}
.screen.active{display:flex}

/* ── HEADER ── */
.week-header{flex-shrink:0;background:var(--bg);padding-top:env(safe-area-inset-top,36px)}
.week-top{display:flex;justify-content:space-between;align-items:center;padding:8px 12px 7px}
.wordmark{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:0.4em;color:var(--lv4);text-transform:uppercase;margin-bottom:2px}
.week-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:0.05em;color:var(--text);line-height:1}
.header-right{display:flex;align-items:center;gap:6px}
.week-nav{display:flex;align-items:center;gap:4px}
.week-range{font-family:'DM Mono',monospace;font-size:9px;color:var(--text);min-width:64px;text-align:center;text-transform:uppercase;letter-spacing:0.05em}
.nav-btn{width:24px;height:24px;border:0.5px solid var(--border2);background:transparent;color:var(--muted2);border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.nav-btn:active{background:rgba(128,128,128,0.2)}
.settings-btn{width:28px;height:28px;border:0.5px solid var(--border2);background:transparent;color:var(--muted2);border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;margin-left:4px}
.settings-btn:active{background:rgba(128,128,128,0.2)}

/* ── DOW HEADER ── */
.dow-header{display:grid;gap:var(--gap);padding:0 8px;border-bottom:0.5px solid var(--border);background:var(--bg);flex-shrink:0}
.dow-spacer{}
.dow-col{display:flex;flex-direction:column;align-items:center;padding:4px 0 5px}
.dow-name{font-family:'DM Mono',monospace;font-size:7px;text-transform:uppercase;color:var(--muted2);letter-spacing:0.04em}
.dow-date-num{font-family:'Bebas Neue',sans-serif;font-size:15px;line-height:1.1;color:var(--muted2)}
.dow-dot{width:3px;height:3px;border-radius:50%;background:transparent;margin-top:1px}
.dow-col.today .dow-name,.dow-col.today .dow-date-num{color:var(--yellow)}
.dow-col.today .dow-dot{background:var(--yellow)}

/* ── GRID ── */
.grid-area{flex:1;display:grid;gap:var(--gap);padding:var(--gap) 8px 0;overflow:hidden}
.time-label{font-family:'DM Mono',monospace;font-size:7px;color:var(--muted);display:flex;align-items:center;justify-content:flex-end;padding-right:3px}
.week-cell{border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.08s;min-width:0;min-height:0;position:relative}
.week-cell:active{transform:scale(0.82)}
.week-cell.now-cell{box-shadow:0 0 0 2px var(--yellow)}
.week-cell.sel-cell{box-shadow:0 0 0 2px rgba(128,128,128,0.8)}
.cell-mark{font-family:'DM Mono',monospace;font-weight:700;pointer-events:none;line-height:1;font-size:clamp(6px,1.8vw,10px)}

/* ── LEGEND ── */
.legend{display:flex;align-items:center;gap:4px;padding:5px 10px 6px;justify-content:flex-end;flex-shrink:0;border-top:0.5px solid var(--border)}
.legend-label{font-family:'DM Mono',monospace;font-size:7px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em}
.legend-box{width:10px;height:10px;border-radius:2px}

/* ── PANELS (detail + settings) ── */
.panel{position:fixed;inset:0;z-index:50;overflow-y:auto;-webkit-overflow-scrolling:touch;transform:translateY(100%);transition:transform 0.36s cubic-bezier(0.2,1,0.3,1)}
.panel.open{transform:translateY(0)}
.panel-inner{padding:44px 20px 64px;max-width:430px;margin:0 auto}

/* detail */
#detail-panel{background:var(--surface)}
.d-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}
.d-badge{font-family:'DM Mono',monospace;font-size:8px;color:var(--lv4);letter-spacing:0.4em;margin-bottom:5px}
.d-hero{display:flex;align-items:baseline;gap:10px}
.d-day{font-family:'Bebas Neue',sans-serif;font-size:64px;line-height:1;color:var(--text);letter-spacing:-2px}
.d-hour{font-family:'Bebas Neue',sans-serif;font-size:32px;line-height:1;color:var(--yellow)}
.d-meta{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted2);margin-top:3px;text-transform:uppercase;letter-spacing:0.1em}
.close-btn{width:34px;height:34px;border:0.5px solid var(--border2);background:rgba(128,128,128,0.08);color:var(--muted2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border-radius:4px}
.close-btn:active{background:rgba(128,128,128,0.2)}
.sec-label{font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:0.28em;text-transform:uppercase;margin-bottom:9px}
.input-card{background:var(--card);border-bottom:3px solid var(--lv4);padding:16px 13px 20px;margin-bottom:16px}
.intensity-row{display:flex;gap:6px}
.lv-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.lv-btn{width:100%;aspect-ratio:1;border:1px solid rgba(128,128,128,0.15);cursor:pointer;border-radius:5px;display:flex;align-items:center;justify-content:center;transition:transform 0.1s}
.lv-btn:active{transform:scale(0.88)}
.lv-btn.act{border:2.5px solid var(--text);box-shadow:0 0 12px rgba(128,128,128,0.2);transform:translateY(-3px)}
.lv-btn-mark{font-size:13px;font-weight:700;line-height:1}
.lv-label{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:0.07em;text-transform:uppercase;text-align:center}
.memo-input{width:100%;min-height:84px;background:var(--card);border:0.5px solid var(--border2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:300;padding:10px 12px;resize:none;outline:none;line-height:1.7;caret-color:var(--lv4);margin-bottom:14px;border-radius:4px}
.memo-input::placeholder{color:var(--muted)}
.save-btn{width:100%;padding:15px;background:var(--lv3);color:#fff;border:none;cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:0.4em;display:flex;align-items:center;justify-content:center;gap:8px;transition:background 0.14s;border-radius:4px}
.save-btn:active{opacity:0.85}

/* ── SETTINGS PANEL ── */
#settings-panel{background:var(--bg)}
.settings-title{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--text);margin-bottom:4px;letter-spacing:0.04em}
.settings-sub{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:0.2em;text-transform:uppercase;margin-bottom:28px}
.s-section{margin-bottom:26px}
.s-section-label{font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:0.3em;text-transform:uppercase;margin-bottom:12px;padding-bottom:6px;border-bottom:0.5px solid var(--border)}

/* MODE TOGGLE */
.mode-toggle{display:flex;gap:8px}
.mode-btn{flex:1;padding:12px 8px;border:0.5px solid var(--border2);background:transparent;color:var(--muted2);cursor:pointer;border-radius:8px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;transition:all 0.15s;display:flex;flex-direction:column;align-items:center;gap:6px}
.mode-btn.active{border-color:var(--lv3);background:rgba(38,166,65,0.1);color:var(--text)}
.mode-btn:active{opacity:0.8}
.mode-icon{font-size:20px}

/* COLOR THEME GRID */
.theme-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.theme-card{border:0.5px solid var(--border2);border-radius:10px;padding:12px;cursor:pointer;transition:all 0.15s;background:var(--card)}
.theme-card.active{border-color:var(--lv3);box-shadow:0 0 0 1px var(--lv3)}
.theme-card:active{opacity:0.8}
.theme-swatches{display:flex;gap:3px;margin-bottom:8px}
.theme-swatch{flex:1;height:20px;border-radius:3px}
.theme-name{font-family:'DM Mono',monospace;font-size:9px;color:var(--text);letter-spacing:0.1em;text-transform:uppercase}
.theme-desc{font-size:10px;color:var(--muted);font-weight:300;margin-top:2px}
.theme-check{display:none;color:var(--lv3);font-size:12px;float:right;margin-top:-18px}
.theme-card.active .theme-check{display:block}

.settings-close{width:100%;margin-top:8px;padding:14px;background:var(--card);border:0.5px solid var(--border2);color:var(--text);cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:0.4em;border-radius:6px;transition:background 0.14s}
.settings-close:active{background:var(--border2)}
</style>
</head>
<body>

<!-- ── WEEKLY SCREEN ── -->
<div id="screen-week" class="screen active">
  <div class="week-header">
    <div class="week-top">
      <div>
        <div class="wordmark">NIMOGRAM</div>
        <div class="week-title">Weekly Matrix</div>
      </div>
      <div class="header-right">
        <div class="week-nav">
          <button class="nav-btn" onclick="changeWeek(-1)">‹</button>
          <div class="week-range" id="week-range">—</div>
          <button class="nav-btn" onclick="changeWeek(1)">›</button>
        </div>
        <button class="settings-btn" onclick="openSettings()">⚙</button>
      </div>
    </div>
    <div class="dow-header" id="dow-header"></div>
  </div>
  <div class="grid-area" id="grid-area"></div>
  <div class="legend">
    <span class="legend-label">High</span>
    <div class="legend-box" id="leg4"></div>
    <div class="legend-box" id="leg3"></div>
    <div class="legend-box" id="leg2"></div>
    <div class="legend-box" id="leg1"></div>
    <div class="legend-box" id="leg0"></div>
    <span class="legend-label">Low</span>
  </div>
</div>

<!-- ── DETAIL PANEL ── -->
<div id="detail-panel" class="panel">
  <div class="panel-inner">
    <div class="d-top">
      <div>
        <div class="d-badge">◉ LOG</div>
        <div class="d-hero">
          <div class="d-day" id="d-day">15</div>
          <div class="d-hour" id="d-hour">08:00</div>
        </div>
        <div class="d-meta" id="d-meta">MON · MARCH 2026</div>
      </div>
      <button class="close-btn" onclick="closeDetail()">✕</button>
    </div>
    <div class="input-card">
      <div class="sec-label" style="margin-bottom:11px">コンディション強度</div>
      <div class="intensity-row" id="intensity-row"></div>
    </div>
    <div class="sec-label">メモ</div>
    <textarea class="memo-input" id="memo-input" placeholder="今の気分や記録など"></textarea>
    <button class="save-btn" onclick="saveAndClose()">✓ &nbsp;SAVE</button>
  </div>
</div>

<!-- ── SETTINGS PANEL ── -->
<div id="settings-panel" class="panel">
  <div class="panel-inner">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
      <div>
        <div class="settings-title">Settings</div>
        <div class="settings-sub">nimogram · appearance</div>
      </div>
      <button class="close-btn" onclick="closeSettings()">✕</button>
    </div>

    <!-- MODE -->
    <div class="s-section">
      <div class="s-section-label">表示モード</div>
      <div class="mode-toggle">
        <button class="mode-btn" id="mode-dark" onclick="setMode('dark')">
          <span class="mode-icon">🌙</span>
          <span>Dark</span>
        </button>
        <button class="mode-btn" id="mode-light" onclick="setMode('light')">
          <span class="mode-icon">☀️</span>
          <span>Light</span>
        </button>
      </div>
    </div>

    <!-- COLOR THEMES -->
    <div class="s-section">
      <div class="s-section-label">カラーテーマ</div>
      <div class="theme-grid" id="theme-grid"></div>
    </div>

    <button class="settings-close" onclick="closeSettings()">閉じる</button>
  </div>
</div>

<script>
// ── COLOR THEMES ──────────────────────────────────────────────────────────
const THEMES = [
  {
    id:'github',name:'GitHub',desc:'定番グリーン',
    lv:['#39d353','#26a641','#006d32','#0e4429','#161b22'],
    empty:'#0d1117',
  },
  {
    id:'ocean',name:'Ocean',desc:'深海ブルー',
    lv:['#58a6ff','#1f6feb','#0d419d','#051d4d','#0c1724'],
    empty:'#090e17',
  },
  {
    id:'sunset',name:'Sunset',desc:'夕暮れオレンジ',
    lv:['#ffa657','#e06c1f','#b94c0f','#7a2f08','#2d1200'],
    empty:'#160900',
  },
  {
    id:'aurora',name:'Aurora',desc:'パープル系',
    lv:['#d2a8ff','#a371f7','#6e40c9','#3d1f8c','#1a0d40'],
    empty:'#0d0720',
  },
  {
    id:'cherry',name:'Cherry',desc:'ピンク・赤',
    lv:['#ff7b7b','#e6302e','#b01010','#6e0909','#250505'],
    empty:'#120202',
  },
  {
    id:'mono',name:'Mono',desc:'モノクローム',
    lv:['#e0e0e0','#a0a0a0','#606060','#303030','#181818'],
    empty:'#0a0a0a',
  },
];

// ── LIGHT/DARK MODE VARS ──────────────────────────────────────────────────
const MODES = {
  dark:{
    bg:'#0d0d0d',surface:'#131313',card:'#181818',
    border:'rgba(255,255,255,0.07)',border2:'rgba(255,255,255,0.13)',
    muted:'#4a4a4a',muted2:'#7a7a7a',text:'#ffffff',
  },
  light:{
    bg:'#f5f5f5',surface:'#ffffff',card:'#ececec',
    border:'rgba(0,0,0,0.08)',border2:'rgba(0,0,0,0.15)',
    muted:'#aaaaaa',muted2:'#888888',text:'#111111',
  },
};

// ── CONSTANTS ──────────────────────────────────────────────────────────────
const LV_MARKS = {4:'++',3:'+',2:'·',1:'−',0:''};
const LV_NAMES = {4:'Peak',3:'Good',2:'Fair',1:'Low',0:'Bad'};
const DOW   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MON_S = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MON_L = ['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];
const HOURS  = Array.from({length:12},(_,i)=>8+i); // 08〜19
const N_ROWS = HOURS.length;
const N_COLS = 7;
const GAP    = 2;
const TIME_W = 22;
const PAD_H  = 8;

// ── STATE ──────────────────────────────────────────────────────────────────
const NOW = new Date();
const saved = JSON.parse(localStorage.getItem('nimo-v6')||'{}');
let ST = {
  weekStart: monday(NOW),
  selDs: null,
  selHour: Math.min(Math.max(NOW.getHours(),8),19),
  data:      saved.data      || {},
  themeId:   saved.themeId   || 'github',
  mode:      saved.mode      || 'dark',
};

function persist(){
  localStorage.setItem('nimo-v6', JSON.stringify({
    data:ST.data, themeId:ST.themeId, mode:ST.mode
  }));
}

// ── THEME APPLICATION ──────────────────────────────────────────────────────
let PAL={}, EMPTY='', LV_TEXT={};

function applyTheme(){
  const th  = THEMES.find(t=>t.id===ST.themeId) || THEMES[0];
  const mo  = MODES[ST.mode];
  const root = document.documentElement;

  // palette
  th.lv.forEach((c,i)=> root.style.setProperty(`--lv${4-i}`, c));
  EMPTY = th.empty;
  PAL   = {4:th.lv[0],3:th.lv[1],2:th.lv[2],1:th.lv[3],0:th.lv[4]};

  // text contrast per level
  LV_TEXT = {};
  th.lv.forEach((c,i)=>{
    const lv = 4-i;
    const r=parseInt(c.slice(1,3),16), g=parseInt(c.slice(3,5),16), b=parseInt(c.slice(5,7),16);
    const lum=(r*299+g*587+b*114)/1000;
    LV_TEXT[lv] = lum>128 ? 'rgba(0,0,0,0.65)' : 'rgba(255,255,255,0.8)';
  });

  // mode
  root.style.setProperty('--bg',      mo.bg);
  root.style.setProperty('--surface', mo.surface);
  root.style.setProperty('--card',    mo.card);
  root.style.setProperty('--border',  mo.border);
  root.style.setProperty('--border2', mo.border2);
  root.style.setProperty('--muted',   mo.muted);
  root.style.setProperty('--muted2',  mo.muted2);
  root.style.setProperty('--text',    mo.text);
  document.querySelector('meta[name=theme-color]')?.setAttribute('content', mo.bg);

  // legend boxes
  [4,3,2,1,0].forEach(lv=>{
    const el=document.getElementById(`leg${lv}`);
    if(el) el.style.background=PAL[lv];
  });
}

// ── UTILS ──────────────────────────────────────────────────────────────────
function monday(d){
  const t=new Date(d); t.setHours(0,0,0,0);
  const dw=t.getDay(); t.setDate(t.getDate()+(dw===0?-6:1-dw)); return t;
}
function ds(d){return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`}
function dsNow(){return ds(NOW)}
function getSlot(dstr,h){return ST.data[dstr]?.slots?.[h]||null}
function setSlot(dstr,h,patch){
  if(!ST.data[dstr]) ST.data[dstr]={slots:{},memo:''};
  ST.data[dstr].slots[h]={...(ST.data[dstr].slots[h]||{}),...patch};
  persist();
}
function slotLv(dstr,h){const s=getSlot(dstr,h);return(s&&s.level!==undefined)?s.level:null}

// ── CELL SIZE ──────────────────────────────────────────────────────────────
function calcCellSize(){
  const screenW=Math.min(window.innerWidth,430);
  const screenH=window.innerHeight;
  const headerH=document.querySelector('.week-header')?.offsetHeight||100;
  const legendH=document.querySelector('.legend')?.offsetHeight||28;
  const availW=screenW-PAD_H*2-TIME_W-GAP*N_COLS;
  const availH=screenH-headerH-legendH-GAP*(N_ROWS-1);
  return Math.max(Math.min(Math.floor(availW/N_COLS),Math.floor(availH/N_ROWS)),14);
}

function applySize(){
  const sz=calcCellSize();
  const screenW=Math.min(window.innerWidth,430);
  const colW=Math.floor((screenW-PAD_H*2-TIME_W-GAP*N_COLS)/N_COLS);
  const grid=document.getElementById('grid-area');
  const dow=document.getElementById('dow-header');
  const cols=`${TIME_W}px repeat(${N_COLS},${colW}px)`;
  if(grid){grid.style.gridTemplateRows=`repeat(${N_ROWS},${sz}px)`;grid.style.gridTemplateColumns=cols;}
  if(dow) dow.style.gridTemplateColumns=cols;
}

window.addEventListener('resize',()=>{applySize();renderWeek();});

// ── RENDER WEEK ────────────────────────────────────────────────────────────
function renderWeek(){
  const ws=ST.weekStart;
  const days=Array.from({length:7},(_,i)=>{const d=new Date(ws);d.setDate(d.getDate()+i);return d;});
  const we=days[6];

  document.getElementById('week-range').textContent=
    ws.getMonth()===we.getMonth()
      ?`${MON_S[ws.getMonth()]} ${ws.getDate()}–${we.getDate()}`
      :`${MON_S[ws.getMonth()]}${ws.getDate()}–${MON_S[we.getMonth()]}${we.getDate()}`;

  // DOW header
  const dowH=document.getElementById('dow-header');
  dowH.innerHTML='<div class="dow-spacer"></div>';
  days.forEach(d=>{
    const isToday=ds(d)===dsNow();
    const col=document.createElement('div');
    col.className='dow-col'+(isToday?' today':'');
    col.innerHTML=`<div class="dow-name">${DOW[d.getDay()].slice(0,3)}</div><div class="dow-date-num">${d.getDate()}</div><div class="dow-dot"></div>`;
    dowH.appendChild(col);
  });

  // Grid
  const grid=document.getElementById('grid-area');
  grid.innerHTML='';
  HOURS.forEach(h=>{
    const tl=document.createElement('div');
    tl.className='time-label'; tl.textContent=h; grid.appendChild(tl);
    days.forEach(d=>{
      const dstr=ds(d),lv=slotLv(dstr,h);
      const isNow=ds(d)===dsNow()&&NOW.getHours()===h;
      const isSel=ST.selDs===dstr&&ST.selHour===h;
      const cell=document.createElement('div');
      cell.className='week-cell'+(isNow?' now-cell':'')+(isSel?' sel-cell':'');
      cell.style.background=lv!==null?PAL[lv]:EMPTY;
      if(lv!==null){
        const mk=document.createElement('span');
        mk.className='cell-mark'; mk.style.color=LV_TEXT[lv]; mk.textContent=LV_MARKS[lv];
        cell.appendChild(mk);
      }
      const slot=getSlot(dstr,h);
      if(slot?.note){
        const dot=document.createElement('div');
        dot.style.cssText='position:absolute;bottom:2px;right:2px;width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,0.6);pointer-events:none';
        cell.appendChild(dot);
      }
      cell.addEventListener('click',()=>openDetail(d,h));
      grid.appendChild(cell);
    });
  });
  applySize();
}

// ── DETAIL ────────────────────────────────────────────────────────────────
function openDetail(dateObj,hour){
  const dstr=ds(dateObj); ST.selDs=dstr; ST.selHour=hour;
  document.getElementById('d-day').textContent=dateObj.getDate();
  document.getElementById('d-hour').textContent=`${hour.toString().padStart(2,'0')}:00`;
  document.getElementById('d-meta').textContent=`${DOW[dateObj.getDay()].toUpperCase()} · ${MON_L[dateObj.getMonth()]} ${dateObj.getFullYear()}`;
  document.getElementById('memo-input').value=ST.data[dstr]?.slots?.[hour]?.note||'';
  renderIntensity();
  document.getElementById('detail-panel').classList.add('open');
  renderWeek();
}
function closeDetail(){document.getElementById('detail-panel').classList.remove('open');renderWeek();}
function saveAndClose(){
  const note=document.getElementById('memo-input').value;
  setSlot(ST.selDs,ST.selHour,{note}); persist(); closeDetail();
}

// ── INTENSITY ─────────────────────────────────────────────────────────────
function renderIntensity(){
  const curLv=slotLv(ST.selDs,ST.selHour);
  const row=document.getElementById('intensity-row'); row.innerHTML='';
  [4,3,2,1,0].forEach(lv=>{
    const isAct=curLv===lv;
    const wrap=document.createElement('div'); wrap.className='lv-wrap';
    const btn=document.createElement('button');
    btn.className='lv-btn'+(isAct?' act':''); btn.style.background=PAL[lv];
    const mark=document.createElement('span');
    mark.className='lv-btn-mark'; mark.style.color=isAct?'rgba(255,255,255,0.95)':LV_TEXT[lv];
    mark.textContent=LV_MARKS[lv]; btn.appendChild(mark);
    btn.addEventListener('click',()=>{
      const newLv=curLv===lv?null:lv;
      if(newLv===null){if(ST.data[ST.selDs]?.slots?.[ST.selHour])delete ST.data[ST.selDs].slots[ST.selHour];persist();}
      else setSlot(ST.selDs,ST.selHour,{level:newLv});
      renderIntensity(); renderWeek();
    });
    const lbl=document.createElement('div'); lbl.className='lv-label';
    lbl.textContent=LV_NAMES[lv]; lbl.style.color=isAct?'var(--text)':'var(--muted)';
    wrap.appendChild(btn); wrap.appendChild(lbl); row.appendChild(wrap);
  });
}

// ── SETTINGS ──────────────────────────────────────────────────────────────
function openSettings(){
  renderSettings();
  document.getElementById('settings-panel').classList.add('open');
}
function closeSettings(){
  document.getElementById('settings-panel').classList.remove('open');
  renderWeek();
}

function setMode(mode){
  ST.mode=mode; persist(); applyTheme(); renderSettings(); renderWeek();
}

function setTheme(id){
  ST.themeId=id; persist(); applyTheme(); renderSettings(); renderWeek();
}

function renderSettings(){
  // mode buttons
  document.getElementById('mode-dark').className='mode-btn'+(ST.mode==='dark'?' active':'');
  document.getElementById('mode-light').className='mode-btn'+(ST.mode==='light'?' active':'');

  // theme cards
  const grid=document.getElementById('theme-grid'); grid.innerHTML='';
  THEMES.forEach(th=>{
    const isAct=ST.themeId===th.id;
    const card=document.createElement('div');
    card.className='theme-card'+(isAct?' active':'');
    const swatches=th.lv.map(c=>`<div class="theme-swatch" style="background:${c}"></div>`).join('');
    card.innerHTML=`
      <div class="theme-swatches">${swatches}</div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div class="theme-name">${th.name}</div>
          <div class="theme-desc">${th.desc}</div>
        </div>
        <div class="theme-check">✓</div>
      </div>`;
    card.addEventListener('click',()=>setTheme(th.id));
    grid.appendChild(card);
  });
}

// ── WEEK NAV ──────────────────────────────────────────────────────────────
function changeWeek(delta){
  ST.weekStart=new Date(ST.weekStart);
  ST.weekStart.setDate(ST.weekStart.getDate()+delta*7);
  renderWeek();
}

// ── INIT ──────────────────────────────────────────────────────────────────
// add theme-color meta if missing
if(!document.querySelector('meta[name=theme-color]')){
  const m=document.createElement('meta'); m.name='theme-color'; document.head.appendChild(m);
}
applyTheme();
renderWeek();
</script>
</body>
</html>
