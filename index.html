<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>THE ENTERPRISE: 覇権奪還</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold:    #C9A84C;
            --emerald: #00D68F;
            --rose:    #FF4D6D;
            --sky:     #38BDF8;
            --amber:   #F59E0B;
            --bg:      #060A11;
            --surf:    #0C1221;
            --bdr:     rgba(255,255,255,0.07);
            --muted:   #2a3a50;
            --D: 'Bebas Neue', cursive;
            --M: 'DM Mono', monospace;
            --B: 'Outfit', sans-serif;
            --grid-size: 6;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: var(--B);
            background: var(--bg);
            color: #7a8fa8;
            display: flex; align-items: center; justify-content: center;
        }
        /* Scanline */
        body::after {
            content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9998;
            background: repeating-linear-gradient(180deg, transparent 0px, transparent 3px, rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px);
        }

        #app {
            width: 100%; max-width: 430px;
            height: 100dvh;
            display: flex; flex-direction: column;
            position: relative; overflow: hidden;
            background: var(--bg);
            opacity: 0; transition: opacity 0.5s;
        }
        #app.visible { opacity: 1; }

        /* ── START OVERLAY ── */
        #mode-select-ov {
            position: fixed; inset: 0; z-index: 10000;
            background: var(--bg); display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px; text-align: center;
        }
        .mode-title { font-family: var(--D); font-size: 42px; color: #fff; letter-spacing: 0.15em; margin-bottom: 8px; }
        .mode-sub { font-size: 11px; color: var(--gold); margin-bottom: 40px; letter-spacing: 0.4em; font-weight: 900; }
        .mode-btns { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 280px; }
        .mode-btn {
            background: rgba(255,255,255,0.03); border: 1px solid var(--bdr);
            color: #fff; border-radius: 16px; padding: 24px;
            font-family: var(--D); font-size: 22px; letter-spacing: 0.2em;
            cursor: pointer; transition: all 0.25s;
        }
        .mode-btn:hover { background: rgba(255,255,255,0.08); border-color: var(--gold); color: var(--gold); transform: translateY(-2px); }

        /* ── HEADER ── */
        .hdr {
            flex: 0 0 auto;
            padding: 14px 18px 0;
            background: var(--bg);
            border-bottom: 1px solid var(--bdr);
            z-index: 10;
        }
        .hdr-row { display: flex; justify-content: space-between; align-items: flex-end; }
        .hdr-tag {
            font-family: var(--D); font-size: 8px; letter-spacing: .65em;
            color: var(--gold); line-height: 1; margin-bottom: 3px;
            display: flex; align-items: center; gap: 5px;
        }
        .hdr-tag::before {
            content: ''; width: 5px; height: 5px; border-radius: 50%;
            background: var(--gold); flex-shrink: 0;
            animation: blink 2s infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
        .hdr-phase { font-family: var(--D); font-size: 32px; color: #fff; line-height: 1; letter-spacing: .04em; }
        .hdr-mh { text-align: right; padding-bottom: 3px; }
        .hdr-mh-lbl { font-size: 7px; font-weight: 700; letter-spacing: .4em; color: var(--muted); text-transform: uppercase; margin-bottom: 1px; }
        .hdr-mh-val { font-family: var(--D); font-size: 36px; color: var(--emerald); line-height: 1; }

        .share-bar {
            margin: 8px 0 0; height: 18px; display: flex; border-radius: 3px;
            overflow: hidden; border: 1px solid var(--bdr);
        }
        .share-seg {
            height: 100%; transition: width .7s ease;
            display: flex; align-items: center; justify-content: center;
            font-family: var(--D); font-size: 11px; color: rgba(255,255,255,.9); 
            white-space: nowrap; overflow: hidden;
            font-weight: 600;
        }

        /* ── GRID AREA ── */
        .grid-wrap {
            flex: 1 1 0;
            min-height: 0;
            display: flex; align-items: center; justify-content: center;
            padding: 8px 14px;
            position: relative;
            overflow: hidden;
        }
        #grid {
            display: grid;
            grid-template-columns: repeat(var(--grid-size), 1fr);
            grid-template-rows: repeat(var(--grid-size), 1fr);
            gap: 5px;
            width: 100%; max-width: 380px;
            aspect-ratio: 1;
        }
        .tile {
            aspect-ratio: 1; border-radius: 7px;
            border: 1.5px solid rgba(255,255,255,.05);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            position: relative; user-select: none;
            transition: transform .12s, box-shadow .12s, border-color .12s;
        }
        .tile:active { transform: scale(.88); }
        .tile.sel {
            border-color: #fff !important;
            box-shadow: 0 0 14px rgba(255,255,255,.35), inset 0 0 6px rgba(255,255,255,.05);
            transform: scale(1.07); z-index: 5;
        }
        .t-lbl { font-family: var(--M); font-size: 14px; color: rgba(255,255,255,.8); pointer-events: none; font-weight: 600; } 

        /* ── ANIMATIONS ── */
        @keyframes rfp  { 0%,100%{box-shadow:0 0 8px var(--gold);border-color:var(--gold)} 50%{box-shadow:0 0 16px var(--gold);border-color:#ffe88a} }
        @keyframes bld  { 0%,100%{box-shadow:0 0 6px rgba(255,255,255,0.2);border-color:rgba(255,255,255,0.35)} 50%{box-shadow:0 0 14px rgba(255,255,255,0.5);border-color:#fff} }
        @keyframes cxo  { 0%,100%{box-shadow:0 0 10px var(--sky);border-color:var(--sky)} 50%{box-shadow:0 0 20px var(--sky);border-color:#93e2ff} }
        .rfp-a  { animation: rfp  1.3s infinite ease-in-out; }
        .bld-a  { animation: bld  1.7s infinite ease-in-out; }
        .cxo-a  { animation: cxo  1.5s infinite ease-in-out; border-width: 2.2px !important; }

        /* ── SIDE PANEL ── */
        .sp {
            position: absolute; top: 0; right: 0; bottom: 0;
            width: 78%;
            background: rgba(6,10,17,0.1); 
            backdrop-filter: blur(25px) saturate(1.4);
            border-left: 1px solid rgba(255,255,255,.1);
            display: flex; flex-direction: column; gap: 10px;
            padding: 16px 15px 14px;
            z-index: 50;
            transform: translateX(100%);
            transition: transform .35s cubic-bezier(.16,1,.3,1);
            overflow-y: auto; overflow-x: hidden;
        }
        .sp::-webkit-scrollbar { display: none; }
        .sp.open { transform: translateX(0); }
        .sp-hdr { display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .sp-tag { font-size: 7px; font-weight: 700; letter-spacing: .5em; color: var(--emerald); text-transform: uppercase; }
        .sp-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; line-height: 1; padding: 2px 4px; transition: color .15s; }
        .sp-name { font-family: var(--D); font-size: 22px; color: #fff; letter-spacing: .04em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
        .sp-full { font-size: 10px; color: #4a5f78; line-height: 1.45; border-left: 3px solid var(--gold); padding-left: 7px; flex-shrink: 0; }
        .sp-stats { display: flex; gap: 6px; flex-shrink: 0; }
        .sp-stat { flex: 1; background: rgba(255,255,255,.02); border: 1px solid var(--bdr); border-radius: 9px; padding: 8px; }
        .sp-sl { font-size: 6px; font-weight: 700; letter-spacing: .4em; color: var(--muted); text-transform: uppercase; margin-bottom: 3px; }
        .sp-sv { font-family: var(--D); font-size: 22px; color: #fff; }
        .sp-win { font-family: var(--D); font-size: 44px; color: #002b5c; -webkit-text-stroke: 1px #fff; line-height: 1; flex-shrink: 0; }
        .sp-row { flex-shrink: 0; }
        .sp-rl { font-size: 6px; font-weight: 700; letter-spacing: .35em; color: var(--muted); text-transform: uppercase; margin-bottom: 2px; }
        .sp-rv { font-family: var(--D); font-size: 14px; color: var(--gold); letter-spacing: .1em; }
        .sp-status { font-size: 11px; font-weight: 600; color: #fff; }
        .sp-btns { margin-top: auto; display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
        .sp-btn {
            background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
            color: #fff; border-radius: 10px; padding: 8px 8px;
            font-family: var(--D); font-size: 13px; letter-spacing: .12em;
            cursor: pointer; transition: all .18s; text-transform: uppercase;
            opacity: 1; 
        }
        .sp-btn:hover:not(:disabled) { background: rgba(255,255,255,.25); border-color: rgba(255,255,255,.4); opacity: 1; }
        .sp-btn.pri { background: rgba(0,214,143,.18); border-color: var(--emerald); color: var(--emerald); }
        .sp-btn.alt { background: rgba(201,168,76,.12); border-color: var(--gold); color: var(--gold); }
        .sp-btn:disabled { opacity: 0.1; cursor: not-allowed; }

        /* ── LOWER UI ── */
        .task-strip { flex: 0 0 50px; min-height: 50px; display: flex; align-items: center; gap: 6px; padding: 0 14px; overflow-x: auto; border-top: 1px solid var(--bdr); background: var(--bg); z-index: 10; }
        .t-chip { flex-shrink: 0; display: flex; align-items: center; gap: 5px; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.1); border-radius: 18px; padding: 3px 9px 3px 11px; font-size: 9.5px; font-weight: 600; color: #c0cee0; }
        .t-chip-name { color: var(--emerald); font-family: var(--M); font-size: 8.5px; }
        .t-chip-rm { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 13px; padding: 0; }

        .exec-btn { flex: 0 0 50px; min-height: 50px; border: none; border-top: 1px solid var(--bdr); background: rgba(255,255,255,.03); color: var(--muted); font-family: var(--D); font-size: 17px; letter-spacing: .55em; text-transform: uppercase; cursor: not-allowed; opacity: .4; transition: all .25s; z-index: 10; }
        .exec-btn.on { background: #fff; color: var(--bg); cursor: pointer; opacity: 1; box-shadow: 0 -8px 24px rgba(255,255,255,.12); }

        .log-area { flex: 0 0 40px; min-height: 40px; overflow: hidden; padding: 5px 15px; border-top: 1px solid var(--bdr); background: var(--bg); z-index: 10; }
        .log-ln { font-family: var(--M); font-size: 8.5px; color: var(--muted); line-height: 1.55; }

        .score-bar { flex: 0 0 48px; min-height: 48px; display: flex; justify-content: space-between; align-items: center; padding: 0 18px; border-top: 1px solid var(--bdr); background: var(--bg); z-index: 10; }
        .score-v { font-family: var(--D); font-size: 30px; color: #fff; }

        /* ── OVERLAYS ── */
        #result-ov, #final-modal { 
            position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; 
            background: rgba(6,10,17,.4); 
            backdrop-filter: blur(8px); 
            z-index: 800; 
        }
        .res-box, .final-box { 
            width: 93%; max-height: 88dvh; border: 1px solid rgba(255,255,255,.12); 
            border-radius: 24px; background: rgba(12,18,33,.6); 
            display: flex; flex-direction: column; overflow: hidden; 
        }
        .res-hdr { padding: 20px; border-bottom: 1px solid var(--bdr); }
        .res-title { font-family: var(--D); font-size: 20px; letter-spacing: .45em; color: var(--gold); }
        .res-list { flex: 1; overflow-y: auto; padding: 10px 18px; }
        .res-block { padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
        .res-bname { font-family: var(--D); color: var(--gold); font-size: 14px; letter-spacing: .2em; border-left: 3px solid var(--gold); padding-left: 8px; margin-bottom: 8px; }
        .res-txt { font-size: 14.5px; color: #aabbcc; }
        .res-next, .final-btn { height: 52px; border: none; background: #fff; color: var(--bg); font-family: var(--D); font-size: 15px; letter-spacing: .5em; text-transform: uppercase; cursor: pointer; }
        
        #final-modal .final-box { text-align: center; padding: 30px 20px; }
        .final-score { font-family: var(--D); font-size: 64px; color: var(--emerald); margin: 20px 0; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="mode-select-ov">
    <div class="mode-title">Operation Scoping</div>
    <div class="mode-sub">SELECT MISSION SCALE</div>
    <div class="mode-btns">
        <button class="mode-btn" onclick="startApp(6)">Standard (6×6)</button>
        <button class="mode-btn" onclick="startApp(8)">Large (8×8)</button>
    </div>
</div>

<div id="app">
    <header class="hdr">
        <div class="hdr-row">
            <div>
                <div class="hdr-tag">TACTICAL COMMAND</div>
                <div class="hdr-phase" id="phase-disp">FY26M1</div>
            </div>
            <div class="hdr-mh">
                <div class="hdr-mh-lbl">RESOURCE MH</div>
                <div class="hdr-mh-val" id="mh-disp">20</div>
            </div>
        </div>
        <div class="share-bar" id="share-bar"></div>
    </header>

    <section class="grid-wrap">
        <div id="grid"></div>
        <aside class="sp" id="sp">
            <div class="sp-hdr"><span class="sp-tag">Tactical Detail</span><button class="sp-close" id="sp-close">✕</button></div>
            <div class="sp-name" id="sp-name">—</div>
            <div class="sp-full" id="sp-full">領域システム情報を確認中...</div>
            <div class="sp-stats">
                <div class="sp-stat"><div class="sp-sl">Visit</div><div class="sp-sv" id="sp-vc">0</div></div>
                <div class="sp-stat"><div class="sp-sl">Win Prob.</div><div class="sp-sv" id="sp-win">0%</div></div>
            </div>
            <div class="sp-row"><div class="sp-rl">Provider</div><div class="sp-rv" id="sp-vendor">—</div></div>
            <div class="sp-row"><div class="sp-rl">Phase</div><div class="sp-status" id="sp-status">—</div></div>
            <div class="sp-btns">
                <div style="display:flex; gap:4px;">
                    <button class="sp-btn" style="flex:1;" onclick="addTask('VISIT',5,'訪問')">Visit(-5)</button>
                    <button class="sp-btn" style="flex:1;" onclick="addTask('SURVEY',3,'調査')">Survey(-3)</button>
                </div>
                <button class="sp-btn" style="width:100%;" onclick="addTask('STUDY',8,'勉強会')">Study (-8 MH)</button>
                <button class="sp-btn" id="sp-spec-btn" onclick="addTask('SPECIN',12,'スペックイン')">Spec-in (-12 MH)</button>
                <button class="sp-btn alt" id="sp-cxo-btn" onclick="addTask('CXO',15,'トップ面談')">CXO Meeting (-15 MH)</button>
                <button class="sp-btn pri" id="sp-prop-btn" onclick="addTask('PROPOSAL',10,'提案')" disabled>Submit Proposal (-10 MH)</button>
            </div>
        </aside>
    </section>

    <div class="task-strip" id="task-strip"></div>
    <button class="exec-btn" id="exec-btn" disabled onclick="executeStrategy()">Launch Mission</button>
    <div class="log-area" id="log-area"></div>

    <footer class="score-bar">
        <div class="score-v" id="score-v">¥0<span>M</span></div>
    </footer>
</div>

<div id="result-ov" class="hidden">
    <div class="res-box">
        <div class="res-hdr"><span class="res-title">CALL REPORT</span></div>
        <div class="res-list" id="res-list"></div>
        <button class="res-next" onclick="closeResult()">Next Cycle ›</button>
    </div>
</div>

<div id="final-modal" class="hidden">
    <div class="final-box">
        <div class="res-hdr"><span class="res-title">ANNUAL RESULT</span></div>
        <div class="final-score" id="final-score">¥0M</div>
        <button class="final-btn" onclick="location.reload()">Reset System</button>
    </div>
</div>

<script>
// --- AUDIO ENGINE ---
let audioCtx = null;
function playSound(freq, type, duration, vol = 0.1) {
    try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    } catch(e) { console.warn("Audio disabled."); }
}

const SFX = {
    select: () => playSound(600, 'sine', 0.1),
    add: () => playSound(800, 'square', 0.05, 0.05),
    exec: () => {
        playSound(200, 'sawtooth', 0.3, 0.1);
        setTimeout(() => playSound(400, 'sawtooth', 0.2, 0.1), 100);
    },
    win: () => {
        [523, 659, 784, 1046].forEach((f, i) => {
            setTimeout(() => playSound(f, 'sine', 0.6, 0.08), i * 120);
        });
    },
    lost: () => playSound(100, 'sawtooth', 0.8, 0.15),
    report: () => playSound(523.25, 'sine', 0.5, 0.1),
    error: () => playSound(150, 'triangle', 0.3, 0.2)
};

// --- GAME LOGIC ---
const MAX_MH = 20;
const VENDORS = {
    H: { name:'H社(SELF)', bg:'#00D68F' }, 
    I: { name:'D社',        bg:'#1E40AF' },
    A: { name:'A社',        bg:'#7C3AED' },
    S: { name:'S社',        bg:'#B45309' },
    E: { name:'E社',        bg:'#DB2777' }, 
    F: { name:'F社',        bg:'#0891B2' }, 
    NONE:{ name:'未開拓', bg:'#060A11' },
    UNK: { name:'情報未取得', bg:'#111926' },
};

// 顧客名を日本名に変更
const CUSTOMER_POOL_BASE = [
    { id:101, name:'北海テクノロジー', budget:120, tiles6:6, tiles8:10 },
    { id:102, name:'札幌ロジスティクス', budget:80,  tiles6:5, tiles8:9 },
    { id:201, name:'エゾ・ネットワーク',  budget:70,  tiles6:5, tiles8:9 },
    { id:202, name:'道央システム開発',  budget:65,  tiles6:3, tiles8:5 },
    { id:401, name:'北海道教育支援',  budget:110, tiles6:5, tiles8:9 },
    { id:501, name:'北日本通商',   budget:80,  tiles6:4, tiles8:7 },
    { id:701, name:'北海アグリ連合', budget:60,  tiles6:3, tiles8:5 },
    { id:901, name:'札幌セキュリティ',  budget:50,  tiles6:2, tiles8:4 },
    { id:1001,name:'道央流通システム',  budget:40,  tiles6:2, tiles8:4 },
    { id:1201,name:'北海道プラント保安',  budget:25,  tiles6:1, tiles8:2 },
];

let state = {
    month:1, mh:MAX_MH, sales:0, selId:null, tasks:[], 
    logs:[], customers:[], grid:[], gridSize: 6, vendorList: []
};

function startApp(size) {
    try {
        SFX.select();
        state.gridSize = size;
        state.vendorList = size === 6 ? ['H','I','A','S'] : ['H','I','A','S','E','F'];
        document.documentElement.style.setProperty('--grid-size', size);
        document.getElementById('mode-select-ov').classList.add('hidden');
        document.getElementById('app').classList.add('visible');
        init();
    } catch(e) { console.error("Start failed: ", e); }
}

function init() {
    state.customers = CUSTOMER_POOL_BASE.map(b => {
        const vendor = state.vendorList[Math.floor(Math.random()*state.vendorList.length)];
        return {
            ...b,
            tiles: state.gridSize === 6 ? b.tiles6 : b.tiles8,
            vendor: vendor,
            mo: Math.floor(Math.random()*45)+1,
            vc:0, specIn:false, cxoProtect:0, intelRevealed:false,
            affinity: Math.floor(Math.random()*21),
            // 自社（H）の場合: base 5〜40% (後のボーナス50%と合算して 55〜90% を実現)
            baseRapport: (vendor === 'H') ? 
                Math.floor(Math.random() * 36) + 5 : 
                Math.floor(Math.random() * 31) + 10 
        };
    });
    buildGrid();
    render();
}

function buildGrid() {
    const size = state.gridSize;
    const totalCells = size * size;
    const grid = Array(totalCells).fill(null);
    const shuffled = [...state.customers].sort(() => Math.random() - 0.5);
    shuffled.forEach(c => {
        let placed = 0;
        while (placed < c.tiles) {
            let options = [];
            let empties = [];
            for (let i = 0; i < totalCells; i++) {
                if (grid[i] === null) {
                    empties.push(i);
                    const row = Math.floor(i / size), col = i % size;
                    const ns = [col > 0 ? i-1 : -1, col < size-1 ? i+1 : -1, row > 0 ? i-size : -1, row < size-1 ? i+size : -1];
                    if (ns.some(n => n !== -1 && grid[n]?.cid === c.id)) options.push(i);
                }
            }
            let target = (placed === 0 || options.length === 0) ? empties[Math.floor(Math.random() * empties.length)] : options[Math.floor(Math.random() * options.length)];
            if (target !== undefined) { grid[target] = { cid: c.id }; placed++; } else break;
        }
    });
    state.grid = grid;
}

function getWR(c, vId = 'H') {
    if (!c) return 0;
    let r = (vId === 'H') ? (c.baseRapport || 5) : 5;
    
    if (vId === 'H') r += (c.vc * 5); 
    else r += (c.affinity || 0);

    if (c.vendor === vId) {
        r += (vId === 'H') ? 50 : 40;
    }
    
    if (c.mo >= 48 && c.mo < 50) r += 40; else if (c.mo >= 50) r -= 20;
    if (vId === 'H' && c.specIn) r += 30;

    if (vId === 'H') {
        state.tasks.filter(t=>t.cid===c.id).forEach(t=>{ 
            if(t.type==='VISIT') r+=5; 
            if(t.type==='STUDY') r+=10; 
            if(t.type==='CXO') r+=50; 
        });
    }
    return Math.min(99, Math.max(5, Math.round(r)));
}

function render() {
    document.getElementById('phase-disp').textContent = `FY26M${state.month}`;
    document.getElementById('mh-disp').textContent = state.mh;
    document.getElementById('score-v').innerHTML = `¥${state.sales}<span>M</span>`;

    const s={};
    state.vendorList.forEach(v => s[v] = 0);
    state.customers.forEach(c=>{ if(s[c.vendor]!==undefined) s[c.vendor]+=c.budget; });
    
    const bar = document.getElementById('share-bar'); bar.innerHTML='';
    const total = Object.values(s).reduce((a,b)=>a+b,0)||1;
    state.vendorList.forEach(v=>{
        const p=(s[v]/total)*100;
        if(p>0){ const d=document.createElement('div'); d.className='share-seg'; d.style.cssText=`width:${p}%;background:${VENDORS[v].bg}`; d.textContent=p>10?Math.round(p)+'%':''; bar.appendChild(d); }
    });

    const size = state.gridSize;
    const gEl = document.getElementById('grid'); gEl.innerHTML='';
    state.grid.forEach(t=>{
        const el=document.createElement('div'); el.className='tile';
        if (t && t.cid) {
            const c=state.customers.find(x=>x.id===t.cid);
            const kn=c.vc>0||c.vendor==='H';
            el.style.backgroundColor=VENDORS[kn?c.vendor:'UNK'].bg;
            if(state.selId===c.id) el.classList.add('sel');
            if(c.cxoProtect > 0) el.classList.add('cxo-a');
            else if(kn && c.mo>=48 && c.mo<50) el.classList.add('rfp-a');
            else if(kn && c.mo>=50) el.classList.add('bld-a');
            const sp=document.createElement('span'); sp.className='t-lbl'; sp.textContent=kn?Math.ceil(c.mo/12):'?'; el.appendChild(sp);
            el.onclick=()=>{ SFX.select(); state.selId=c.id; render(); };
        } else el.style.backgroundColor=VENDORS.NONE.bg;
        gEl.appendChild(el);
    });

    const sp=document.getElementById('sp');
    if (state.selId) {
        const c=state.customers.find(x=>x.id===state.selId);
        sp.classList.add('open');
        document.getElementById('sp-name').textContent=c.name;
        document.getElementById('sp-vc').textContent=c.vc;
        document.getElementById('sp-win').textContent=`${getWR(c)}%`;
        const kn=c.vc>0||c.vendor==='H';
        document.getElementById('sp-vendor').textContent= (kn || c.intelRevealed) ? VENDORS[c.vendor].name : '？';
        const st=document.getElementById('sp-status');
        if(c.cxoProtect>0){ st.textContent=`🛡 CXO防衛中 (${c.cxoProtect})`; st.style.color='var(--sky)'; }
        else if(c.mo>=50){ st.textContent='運用/構築中'; st.style.color=''; }
        else if(c.mo>=48){ st.textContent='📄 RFP放出中'; st.style.color='var(--amber)'; }
        else{ st.textContent='稼働中'; st.style.color=''; }
        
        document.getElementById('sp-prop-btn').disabled=!(kn && c.mo>=48 && c.mo<50);
        document.getElementById('sp-spec-btn').disabled=(c.mo>=48 || c.specIn || getWR(c) < 75);
        document.getElementById('sp-cxo-btn').disabled=(getWR(c) < 75);
    } else sp.classList.remove('open');

    const ts=document.getElementById('task-strip'); ts.innerHTML='';
    state.tasks.forEach((t,i)=>{
        const c=document.createElement('div'); c.className='t-chip';
        c.innerHTML=`<span class="t-chip-name">${t.cname}</span><span>${t.label}</span><button class="t-chip-rm" onclick="removeTask(${i})">✕</button>`;
        ts.appendChild(c);
    });
    document.getElementById('exec-btn').disabled=state.tasks.length===0;
    document.getElementById('exec-btn').className='exec-btn'+(state.tasks.length?' on':'');
}

function addTask(type,cost,label) {
    if(!state.selId || state.mh<cost) { SFX.error(); return; }
    SFX.add();
    const c=state.customers.find(x=>x.id===state.selId);
    state.tasks.push({cid:c.id,cname:c.name,type,cost,label});
    state.mh-=cost; state.selId=null; render();
}
function removeTask(i) { SFX.select(); state.mh+=state.tasks[i].cost; state.tasks.splice(i,1); render(); }

function executeStrategy() {
    SFX.exec();
    let tr = [];
    const activeCids = [...new Set(state.tasks.map(t => t.cid))];

    state.tasks.forEach(t=>{
        const c=state.customers.find(x=>x.id===t.cid);
        const wr = getWR(c);
        
        // ── 信頼度に応じた動的なメッセージ生成 ──
        const getDynamicMsg = (type, currentWr) => {
            const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];
            const otherRivals = state.vendorList.filter(v => v !== 'H' && v !== c.vendor);
            const rName = VENDORS[pick(otherRivals)].name;

            if (type === 'VISIT') {
                if (currentWr >= 75) return pick([
                    `担当者と密談。${rName}の提案に不信感を持っているようです。`,
                    "温かい歓迎。他社のカタログはすべて片付けられていました。",
                    "キーマンと意気投合。次回のRFP要件について内密に相談を受けました。"
                ]);
                if (currentWr >= 40) return pick([
                    "世間話に終執しましたが、こちらの新製品には興味を示しています。",
                    `受付で${rName}の担当者とすれ違いました。競争が激化しています。`,
                    "担当者は多忙そうでしたが、短い面談でポジティブな感触を得ました。"
                ]);
                return pick([
                    "受付での対応は冷ややか。他社のカタログが山積みになっています。",
                    `${rName}の製品が現場に深く浸透しており、切り込みが難しい状況です。`,
                    "門前払い一歩手前。信頼構築にはまだ時間がかかりそうです。"
                ]);
            }
            if (type === 'STUDY') {
                if (currentWr >= 75) return pick([
                    "現場エンジニアと深い技術交流。自社仕様への完全な理解を得ました。",
                    "「これなら他社から乗り換える価値がある」との評価を頂きました。",
                    "質疑応答が活発に行われ、現場の支持を完全に掌握しました。"
                ]);
                return pick([
                    "勉強会は盛況。製品への理解度が一段階上がったようです。",
                    "他社比較の質問が多く出ましたが、概ねこちらの優位性をアピールできました。",
                    "出席者の反応は上々。次なるアクションへの橋渡しが完了しました。"
                ]);
            }
            if (type === 'SURVEY') return `市場調査により${VENDORS[c.vendor].name}の動向を特定。`;
            if (type === 'SPECIN') return pick([
                "スペックイン成功。RFP要件に自社仕様がガッチリ組み込まれました。",
                "要件定義に潜り込み完了。他社が追随できない仕様を仕込みました。"
            ]);
            if (type === 'CXO') return pick([
                "CXOと合意。以後3ヶ月間、他社の介入を完全にシャットアウトします。",
                "トップダウンでの自社採用方針が固まりました。鉄壁の防衛。 "
            ]);
            return "";
        };

        if(t.type==='VISIT'){ 
            c.vc++; 
            tr.push({n:c.name, tx: getDynamicMsg('VISIT', wr)}); 
        }
        else if(t.type==='STUDY'){ 
            c.vc += 2; 
            tr.push({n:c.name, tx: getDynamicMsg('STUDY', wr)});
        }
        else if(t.type==='SURVEY'){ c.intelRevealed=true; tr.push({n:c.name, tx: getDynamicMsg('SURVEY', wr)}); }
        else if(t.type==='SPECIN'){ c.specIn=true; tr.push({n:c.name, tx: getDynamicMsg('SPECIN', wr)}); }
        else if(t.type==='CXO'){ c.cxoProtect=4; tr.push({n:c.name, tx: getDynamicMsg('CXO', wr)}); }
        else if(t.type==='PROPOSAL'){
            const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];
            if(Math.random()*100 < wr){ 
                SFX.win(); c.vendor='H'; c.mo=55; state.sales+=c.budget; 
                tr.push({n:c.name, tx: pick(['【受注】覇権を奪還しました！構築フェーズへ。', '【受注】満場一致で採用決定。圧倒的な勝利です。'])}); 
            } else { 
                SFX.lost(); 
                tr.push({n:c.name, tx: pick(['【失注】競合のロジックに押し切られました。', '【失注】最後の最後でリリースのタイミングが合わず。'])}); 
            }
        }
    });

    state.vendorList.filter(v => v !== 'H').forEach(rid => {
        let rmh = Math.floor(Math.random() * 11) + 15; 
        while (rmh >= 6) {
            const targets = state.customers.filter(c => c.vendor !== rid && c.cxoProtect <= 0 && c.mo < 50);
            if (!targets.length) break;
            const tgt = targets[Math.floor(Math.random() * targets.length)];
            if (rmh >= 12 && getWR(tgt, rid) >= 75 && (tgt.mo >= 48 || activeCids.includes(tgt.id))) {
                rmh -= 12;
                if (Math.random() * 100 < (tgt.mo >= 48 ? 35 : 12)) {
                    tgt.vendor = rid; tgt.mo = 1; tgt.vc = 0; tgt.specIn = false;
                    tr.push({ n: tgt.name, tx: `【急報】${VENDORS[rid].name}のリソース集中投下によりベンダーが交代。` });
                }
            } else { rmh -= 6; }
        }
    });

    state.month++; state.tasks=[]; state.mh=MAX_MH; state.selId=null;
    state.customers.forEach(c=>{ c.mo=c.mo>=60?1:c.mo+1; if(c.cxoProtect>0) c.cxoProtect--; });
    const rl=document.getElementById('res-list'); rl.innerHTML='';
    tr.forEach(r=>{ rl.innerHTML+=`<div class="res-block"><div class="res-bname">${r.n}</div><div class="res-txt">${r.tx}</div></div>`; });
    setTimeout(() => { SFX.report(); document.getElementById('result-ov').classList.remove('hidden'); }, 300);
    render();
}

function closeResult() { 
    SFX.select();
    document.getElementById('result-ov').classList.add('hidden'); 
    if(state.month>12) { 
        document.getElementById('final-score').textContent=`¥${state.sales}M`; 
        document.getElementById('final-modal').classList.remove('hidden'); 
    } 
}

document.getElementById('sp-close').onclick=()=>{ SFX.select(); state.selId=null; render(); };
</script>
</body>
</html>
