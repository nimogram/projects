<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>MEAL LOG v8.1.9</title>
    
    <!-- Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #010206;
            --em: #bef264;
            --em-grad: linear-gradient(135deg, #bef264 0%, #84cc16 100%);
            --tx: #f1f3f9;
            --mu: #475569;
        }

        body { 
            font-family: 'Noto Sans JP', sans-serif; 
            background: var(--bg); 
            color: var(--tx); 
            height: 100dvh; 
            overflow: hidden;
            position: relative;
        }

        .serif { font-family: 'DM Serif Display', serif; }
        .mono { font-family: 'DM Mono', monospace; }

        body::before {
            content: ''; position: fixed; inset: 0;
            background: radial-gradient(circle at 10% 10%, #152515 0%, transparent 40%),
                        radial-gradient(circle at 90% 90%, #0a0f1e 0%, transparent 40%);
            z-index: -1;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        @keyframes pulse-glow { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        .shimmer-layer {
            position: absolute; inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            animation: shimmer 2.5s infinite linear;
        }
        .glow-head {
            position: absolute; top: -3px; right: -2px;
            width: 8px; height: 8px;
            background: var(--em);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--em), 0 0 4px #fff;
            animation: pulse-glow 2s infinite;
        }

        .animate-slide { animation: slideUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

        input[type=range] { -webkit-appearance: none; background: transparent; cursor: pointer; }
        input[type=range]::-webkit-slider-runnable-track { background: rgba(255,255,255,0.05); height: 4px; border-radius: 2px; }
        input[type=range]::-webkit-slider-thumb { 
            -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; 
            background: var(--em); margin-top: -10px; border: 2px solid var(--bg);
            box-shadow: 0 0 15px rgba(190, 242, 100, 0.3);
        }

        .floating-shuffle {
            position: fixed; bottom: 110px; right: 20px; width: 56px; height: 56px;
            background: var(--em-grad); border-radius: 28px; display: flex;
            align-items: center; justify-content: center; box-shadow: 0 8px 24px rgba(190, 242, 100, 0.4); z-index: 110;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        const GAS_URL = "https://script.google.com/macros/s/AKfycbzTJRcZnupMLgvX28yX6wqpSZj2vIs8JydRv2AMJNj4ULsIpm_Hh-C16eVCgYOcE97kwQ/exec";
        const TARGET = 120;

        // 日本時間(JST)の厳密なYYYY-MM-DD取得
        const getJstDateString = (date = new Date()) => {
            return new Intl.DateTimeFormat('sv-SE', {
                timeZone: 'Asia/Tokyo', year: 'numeric', month: '2-digit', day: '2-digit'
            }).format(date); 
        };

        const getJstTimestamp = (date = new Date()) => {
            const parts = new Intl.DateTimeFormat('ja-JP', {
                timeZone: 'Asia/Tokyo', year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
            }).formatToParts(date);
            const p = {};
            parts.forEach(({type, value}) => p[type] = value);
            return `${p.year}-${p.month}-${p.day}T${p.hour}:${p.minute}:${p.second}`;
        };

        const App = () => {
            const [todayStr, setTodayStr] = useState(getJstDateString());
            const [meals, setMeals] = useState([]);
            const [masterMenus, setMasterMenus] = useState([]);
            const [tab, setTab] = useState('log');
            const [syncing, setSyncing] = useState(false);
            const [toast, setToast] = useState('');
            const [selDate, setSelDate] = useState(getJstDateString());
            const [mealType, setMealType] = useState('昼');
            const [mainMenu, setMainMenu] = useState('');
            const [protein, setProtein] = useState(25.0);
            const [effect, setEffect] = useState('all');
            const [shuffleSeed, setShuffleSeed] = useState(0);
            const [showMorningPrompt, setShowMorningPrompt] = useState(false);

            const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 3000); };

            const fetchData = useCallback(async () => {
                setSyncing(true);
                // 同期タイミングで「今」のJST日付を再取得
                const freshToday = getJstDateString();
                setTodayStr(freshToday);
                
                try {
                    const r = await fetch(`${GAS_URL}?cache=${Date.now()}`);
                    const data = await r.json();
                    const historyRaw = data.history || (Array.isArray(data) ? data : []);
                    
                    const cleanedLogs = historyRaw
                        .filter(m => {
                            if (!m) return false;
                            const name = (m.main || m.Main_Menu || "").toString().trim();
                            const val = Number(m.protein || m.Protein_g || 0);
                            return name.length > 0 && name !== "-" && (val > 0 || name.includes("朝セット"));
                        })
                        .map(m => {
                            const rawTs = (m.timestamp || m.Timestamp || "").toString();
                            // 日付正規化: 形式を問わず YYYY-MM-DD を抽出
                            const dateMatch = rawTs.match(/(\d{4})[/-](\d{1,2})[/-](\d{1,2})/) || 
                                              rawTs.match(/(\d{1,2})[/-](\d{1,2})[/-](\d{4})/);
                            
                            let normDate = "";
                            if (dateMatch) {
                                if (dateMatch[1].length === 4) { // YYYY-MM-DD
                                    normDate = `${dateMatch[1]}-${dateMatch[2].padStart(2, '0')}-${dateMatch[3].padStart(2, '0')}`;
                                } else { // DD-MM-YYYY or MM-DD-YYYY
                                    normDate = `${dateMatch[3]}-${dateMatch[2].padStart(2, '0')}-${dateMatch[1].padStart(2, '0')}`;
                                }
                            } else {
                                normDate = rawTs.split(/[ T]/)[0].replace(/\//g, '-');
                            }
                            
                            return {
                                id: rawTs + "_" + (m.main || m.Main_Menu),
                                main: m.main || m.Main_Menu || "無題",
                                protein: Number(m.protein || m.Protein_g || 0),
                                type: m.type || m.Meal_Type || "他",
                                timestamp: rawTs,
                                dateOnly: normDate
                            };
                        });
                    setMeals(cleanedLogs);

                    if (data.menus && Array.isArray(data.menus)) {
                        setMasterMenus(data.menus.map(m => ({
                            main: m.main || m.Main_Menu || "Unknown",
                            p: Number(m.p || m.Protein_g || 20),
                            tags: m.tags ? (Array.isArray(m.tags) ? m.tags : String(m.tags).split(',').map(t=>t.trim())) : [],
                            cat: (m.cat || m.Category || "all").toString().toLowerCase()
                        })));
                    }
                    showToast('SYSTEM SYNCED');
                } catch (e) { 
                    console.error(e);
                    showToast('OFFLINE MODE'); 
                } finally { setSyncing(false); }
            }, []);

            useEffect(() => { 
                fetchData(); 
                const jstHour = parseInt(new Intl.DateTimeFormat('ja-JP', { 
                    hour: 'numeric', hour12: false, timeZone: 'Asia/Tokyo' 
                }).format(new Date()));
                
                if (jstHour >= 4 && jstHour < 11) {
                    setMealType('朝');
                    setShowMorningPrompt(true);
                } else if (jstHour >= 11 && jstHour < 17) {
                    setMealType('昼');
                    setShowMorningPrompt(false);
                } else {
                    setMealType('夜');
                    setShowMorningPrompt(false);
                }
            }, [fetchData]);

            const currentMeals = useMemo(() => (meals || []).filter(m => m.dateOnly === selDate), [meals, selDate]);
            const totalP = useMemo(() => currentMeals.reduce((sum, m) => sum + (m.protein || 0), 0), [currentMeals]);
            const progress = Math.min((totalP / TARGET) * 100, 100);

            const handleSave = async (mName, mP, mType) => {
                if (!mName || mName.trim().length < 2) return;
                const jstTimestamp = getJstTimestamp();
                const jstDate = getJstDateString();
                
                const newMeal = { 
                    id: jstTimestamp + "_" + mName, main: mName.trim(), protein: mP, 
                    type: mType, timestamp: jstTimestamp, dateOnly: jstDate 
                };
                
                setMeals(prev => [newMeal, ...prev]);
                showToast('SAVING...');
                
                try { 
                    await fetch(GAS_URL, { 
                        method:'POST', 
                        mode:'no-cors', 
                        body: JSON.stringify({ _action:'save', main: mName.trim(), protein: mP, type: mType, timestamp: jstTimestamp }) 
                    }); 
                    setMainMenu('');
                    setTimeout(fetchData, 800);
                } catch(e){ showToast('SYNC ERROR'); }
            };

            const chartSvg = useMemo(() => {
                const W=320, H=150, PL=30, PR=10, PT=20, PB=30, cW=W-PL-PR, cH=H-PT-PB;
                const days = Array.from({length:7}, (_,i) => {
                    const d = new Date(); d.setDate(d.getDate() - (6-i));
                    const ds = getJstDateString(d);
                    const val = (meals || []).filter(m => m.dateOnly === ds).reduce((s,m)=>s+(m.protein || 0),0);
                    return { lbl: ['日','月','火','水','木','金','土'][d.getDay()], val, isToday: ds === todayStr };
                });
                const maxV = Math.max(...days.map(d=>d.val), TARGET, 10) * 1.15;
                const xStep = cW/6;
                const pts = days.map((d, i) => ({ x: PL + i*xStep, y: PT + cH - (d.val/maxV)*cH, ...d }));
                const pathD = pts.map((p, i) => (i===0 ? 'M' : 'L') + `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
                
                return (
                    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%', height:'100%', overflow:'visible'}}>
                        {[0, TARGET/2, TARGET].map(v => {
                            const y = PT + cH - (v / maxV) * cH;
                            return (
                                <g key={v}>
                                    <line x1={PL} y1={y} x2={W-PR} y2={y} stroke={v === TARGET ? '#fbbf24' : '#475569'} strokeWidth={v === TARGET ? 2 : 1} strokeDasharray="4,4" opacity="0.3" />
                                    <text x={PL-5} y={y+3} className="mono" fontSize="8" fill="#475569" textAnchor="end">{v}</text>
                                </g>
                            );
                        })}
                        <path d={pathD} fill="none" stroke="#bef264" strokeWidth="2.5" strokeLinejoin="round" />
                        {pts.map((p, i) => (
                            <g key={i}>
                                <circle cx={p.x} cy={p.y} r={p.isToday ? 5 : 3} fill={p.val >= TARGET ? '#bef264' : p.val > 0 ? 'white' : '#475569'} />
                                <text x={p.x} y={H-5} fontSize="9" fill={p.isToday ? '#bef264' : '#475569'} textAnchor="middle">{p.lbl}</text>
                                {p.val > 0 && <text x={p.x} y={p.y - 10} fontSize="10" fill="white" className="mono" textAnchor="middle" fontWeight="900">{Math.round(p.val)}</text>}
                            </g>
                        ))}
                    </svg>
                );
            }, [meals, todayStr]);

            const suggestions = useMemo(() => {
                if (!masterMenus || masterMenus.length === 0) return [];
                const recentMealNames = (meals || []).slice(0, 3).map(m => (m.main || "").toLowerCase());
                
                let pool = masterMenus;
                if (effect !== 'all') {
                    const categoryMap = { '疲労回復': 'recovery', '筋トレ': 'muscle', '若返り': 'antiaging' };
                    const targetCat = categoryMap[effect] || effect.toLowerCase();
                    pool = masterMenus.filter(m => m.cat && m.cat.includes(targetCat));
                }
                
                let filteredPool = pool.filter(m => !recentMealNames.includes(m.main.toLowerCase()));
                const finalPool = filteredPool.length > 0 ? filteredPool : pool;

                const seeded = [...finalPool].map((m, i) => ({ m, r: Math.sin(shuffleSeed * 997 + i * 31) }));
                return seeded.sort((a, b) => a.r - b.r).slice(0, 3).map(x => x.m);
            }, [masterMenus, effect, shuffleSeed, meals]);

            return (
                <div className="flex flex-col h-screen max-w-[430px] mx-auto overflow-hidden">
                    {toast && (
                        <div className="fixed top-5 left-1/2 -translate-x-1/2 bg-[#bef264] text-black px-6 py-2 rounded-full mono text-[10px] font-black z-[999] shadow-lg animate-bounce text-center whitespace-nowrap">{toast}</div>
                    )}

                    {tab === 'suggest' && (
                        <button className="floating-shuffle active:scale-90 transition-transform" onClick={() => setShuffleSeed(s => s + 1)}>
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" strokeWidth="3"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
                        </button>
                    )}
                    
                    <header className="p-5 pb-2 shrink-0 text-left">
                        <div className="flex justify-between items-start mb-4">
                            <div>
                                <h1 className="serif text-3xl text-[#bef264] leading-none">MEAL LOG</h1>
                                <p className="mono text-[8px] text-[#475569] tracking-widest mt-1 uppercase">v8.1.9 JST Absolute</p>
                            </div>
                            <button onClick={fetchData} className={`w-9 h-9 bg-white/5 rounded-full border border-white/10 flex items-center justify-center text-[#bef264] ${syncing ? 'animate-spin' : ''}`}>
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
                            </button>
                        </div>

                        <div className="bg-white/[0.02] backdrop-blur-3xl border border-white/10 p-5 rounded-2xl relative overflow-hidden">
                            <div className="flex justify-between items-center mb-4">
                                <span className="mono text-[8px] text-[#475569] font-bold tracking-widest uppercase">DAILY PROTEIN FLOW</span>
                                <span className="mono text-3xl font-black text-[#f1f3f9] leading-none text-right">{totalP.toFixed(1)}<span className="text-[10px] text-[#475569] ml-1">g</span></span>
                            </div>
                            <div className="h-1 bg-white/5 rounded-full relative overflow-hidden">
                                <div className="h-full bg-gradient-to-r from-[#bef264] to-[#84cc16] transition-all duration-1000" style={{ width: `${progress}%` }}>
                                    <div className="shimmer-layer"></div>
                                    <div className="glow-head"></div>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 overflow-hidden px-4 flex flex-col">
                        {tab === 'log' && (
                            <div className="flex flex-col h-full animate-slide">
                                <div className="flex justify-center gap-5 items-center mb-4 shrink-0">
                                    <button onClick={() => { 
                                        const d = new Date(selDate + 'T12:00:00'); d.setDate(d.getDate()-1);
                                        setSelDate(getJstDateString(d));
                                    }} className="text-[#475569] p-2 text-xl">◀</button>
                                    <div className="serif text-xl">{selDate.split('-')[1]}/{selDate.split('-')[2]}</div>
                                    <button onClick={() => { if(selDate < todayStr) setSelDate(todayStr) }} className={`text-[#475569] p-2 text-xl ${selDate === todayStr ? 'opacity-0' : ''}`}>▶</button>
                                </div>

                                <section className="bg-white/5 p-5 rounded-3xl mb-5 shrink-0 text-left">
                                    <div className="flex gap-2 mb-4">
                                        {['朝','昼','夜','他'].map(t => (
                                            <button key={t} onClick={() => { setMealType(t); setShowMorningPrompt(t === '朝'); }} className={`flex-1 py-3 rounded-xl font-black text-xs transition-all ${mealType === t ? 'bg-[#bef264] text-black shadow-lg' : 'bg-white/5 text-[#475569]'}`}>{t}</button>
                                        ))}
                                    </div>

                                    {showMorningPrompt && selDate === todayStr && (
                                        <div className="bg-[#bef264]/10 border border-dashed border-[#bef264] rounded-2xl p-4 mb-4 text-center animate-slide">
                                            <p className="text-[11px] font-bold text-[#bef264] mb-3">朝セット（23g）をレポしますか？</p>
                                            <div className="flex gap-2">
                                                <button onClick={() => { handleSave('朝セット（プロテインと豆乳コーヒー）', 23, '朝'); setShowMorningPrompt(false); }} className="flex-1 bg-[#bef264] text-black py-2 rounded-xl text-[10px] font-black active:scale-95 transition-all">YES</button>
                                                <button onClick={() => setShowMorningPrompt(false)} className="flex-1 bg-white/5 text-[#475569] py-2 rounded-xl text-[10px] font-black active:scale-95 transition-all">NO</button>
                                            </div>
                                        </div>
                                    )}

                                    <input value={mainMenu} onChange={e => setMainMenu(e.target.value)} placeholder="Main Menu" className="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-sm text-[#tx] outline-none mb-4 focus:border-[#bef264]/50" />
                                    <div className="mb-5">
                                        <div className="flex justify-between items-end mb-2">
                                            <span className="text-[8px] text-[#mu] font-bold tracking-widest uppercase">Strategic Weight</span>
                                            <span className="serif text-3xl text-[#bef264]">{protein.toFixed(1)}<span className="text-xs ml-1 font-mono">g</span></span>
                                        </div>
                                        <div className="flex items-center gap-3">
                                            <button onClick={() => setProtein(p => Math.max(0, p - 0.5))} className="px-3 py-2 bg-white/5 border border-white/10 text-[#bef264] rounded-xl mono text-xs font-black active:scale-90">-0.5</button>
                                            <input type="range" min="0" max="60" step="0.5" value={protein} onChange={e => setProtein(parseFloat(e.target.value))} className="flex-1" />
                                            <button onClick={() => setProtein(p => Math.min(60, p + 0.5))} className="px-3 py-2 bg-white/5 border border-white/10 text-[#bef264] rounded-xl mono text-xs font-black active:scale-90">+0.5</button>
                                        </div>
                                    </div>
                                    <button onClick={() => handleSave(mainMenu, protein, mealType)} className="w-full py-4 bg-gradient-to-r from-[#bef264] to-[#84cc16] text-black font-black rounded-2xl shadow-xl active:scale-[0.98] transition-all">STAY HEALTHY →</button>
                                </section>

                                <div className="flex-1 overflow-y-auto no-scrollbar pb-24 space-y-2">
                                    {(currentMeals || []).length === 0 ? (
                                        <div className="text-center py-10 opacity-30 text-[10px] tracking-widest uppercase">No Records Today</div>
                                    ) : currentMeals.map(m => (
                                        <div key={m.id} className="bg-white/5 border border-white/5 p-4 rounded-2xl flex justify-between items-center animate-slide">
                                            <div className="text-left">
                                                <div className="flex items-center gap-2 mb-1">
                                                    <span className="text-[8px] bg-[#bef264] text-black px-1.5 py-0.5 rounded font-black uppercase">{m.type}</span>
                                                    <span className="serif text-base">{m.main}</span>
                                                </div>
                                                <div className="text-[7px] text-[#475569] mono tracking-tighter uppercase">{m.timestamp.split(/[ T]/)[1]?.slice(0,5) || "--:--"} • Verified</div>
                                            </div>
                                            <div className="serif text-xl text-[#bef264]">{m.protein.toFixed(1)}g</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {tab === 'suggest' && (
                            <div className="flex flex-col h-full animate-slide">
                                <div className="flex gap-2 overflow-x-auto no-scrollbar mb-4 shrink-0">
                                    {['すべて','疲労回復','筋トレ','若返り'].map(cat => (
                                        <button key={cat} onClick={() => setEffect(cat === 'すべて' ? 'all' : cat)} className={`shrink-0 px-5 py-2.5 rounded-xl border border-white/10 font-black text-[10px] transition-all ${effect === (cat === 'すべて' ? 'all' : cat) ? 'bg-[#bef264] text-black shadow-lg' : 'bg-white/5 text-[#475569]'}`}>{cat}</button>
                                    ))}
                                </div>
                                <div className="flex-1 overflow-y-auto no-scrollbar pb-24 space-y-3">
                                    {(suggestions || []).length === 0 ? (
                                        <div className="text-center py-10 opacity-30 text-[10px] tracking-widest uppercase">No Suggestions Found</div>
                                    ) : suggestions.map((opt, i) => (
                                        <div key={i} className="bg-white/5 p-5 rounded-3xl border border-white/5 text-left animate-slide">
                                            <div className="flex justify-between items-center mb-2">
                                                <div className="serif text-lg">{opt.main}</div>
                                                <div className="serif text-2xl text-[#bef264]">{opt.p}g</div>
                                            </div>
                                            <div className="bg-[#bef264]/5 border-l-2 border-[#bef264] p-3 rounded-r-lg text-[10px] italic mb-3 opacity-80 leading-relaxed text-[#f1f3f9]">
                                                規律ある身体資産の構築へ。
                                            </div>
                                            <div className="flex gap-2 flex-wrap">
                                                {(opt.tags || []).map(tag => (
                                                    <span key={tag} className="text-[8px] text-[#bef264] border border-[#bef264] px-2 py-0.5 rounded font-black uppercase tracking-tight">{tag}</span>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {tab === 'stats' && (
                            <div className="flex flex-col h-full animate-slide">
                                <div className="bg-white/5 p-5 rounded-3xl mb-4 shrink-0">
                                    <div className="flex justify-between mono text-[9px] text-[#475569] tracking-widest mb-3 uppercase px-1">
                                        <span>7-Day Trend Analysis</span>
                                        <span className="text-[#fbbf24]">Target: 120g</span>
                                    </div>
                                    <div className="h-40">{chartSvg}</div>
                                </div>
                                <div className="flex-1 overflow-y-auto no-scrollbar pb-24">
                                    <p className="text-[8px] text-[#475569] font-bold tracking-widest mb-3 uppercase text-left px-1">Last 3 Days Discipline</p>
                                    {[0, 1, 2].map(offset => {
                                        const ds = getJstDateString(new Date(Date.now() - offset * 86400000));
                                        const dayMeals = (meals || []).filter(m => m.dateOnly === ds);
                                        if (dayMeals.length === 0) return null;
                                        return dayMeals.map((m, i) => (
                                            <div key={m.id} className={`bg-white/5 p-4 rounded-2xl mb-2 flex justify-between items-center ${m.dateOnly === todayStr ? 'opacity-100' : 'opacity-60'}`}>
                                                <div className="flex items-center gap-3">
                                                    <div className={`text-[7px] px-2 py-1 rounded font-black ${m.dateOnly === todayStr ? 'bg-[#bef264] text-black shadow-lg' : 'bg-[#475569] text-black'}`}>
                                                        {m.dateOnly.split('-').slice(1).join('/')}
                                                    </div>
                                                    <div className="text-sm font-bold text-left">{m.main}</div>
                                                </div>
                                                <div className="serif text-lg text-[#bef264]">{m.protein.toFixed(1)}g</div>
                                            </div>
                                        ));
                                    })}
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 max-w-[430px] mx-auto h-[85px] bg-[#010206]/90 backdrop-blur-3xl flex justify-around items-center border-t border-white/5 z-[100]">
                        {[
                            { id: 'log', lbl: 'LOG', icon: 'M9 11l3 3L22 4 M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11' },
                            { id: 'suggest', lbl: 'STRATEGY', icon: 'M12 2a7 7 0 0 1 7 7c0 2.5-1.3 4.7-3.3 6l-.7 4H9l-.7-4A7 7 0 0 1 5 9a7 7 0 0 1 7-7z' },
                            { id: 'stats', lbl: 'ANALYSIS', icon: 'M22 12h-4l-3 9L9 3l-3 9H2' }
                        ].map(t => (
                            <button key={t.id} onClick={() => setTab(t.id)} className={`flex-1 flex flex-col items-center gap-1.5 transition-all duration-300 px-6 ${tab === t.id ? 'text-[#bef264]' : 'text-[#475569] hover:text-[#f1f3f9]'}`}>
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d={t.icon} /></svg>
                                <span className="mono text-[8px] font-black">{t.lbl}</span>
                                {tab === t.id && <div className="w-1 h-1 bg-[#bef264] rounded-full shadow-[0_0_10px_#bef264] mt-1" />}
                            </button>
                        ))}
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
