<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>NIMOGRAM LOG</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;700&display=swap');

        :root {
            --lv5: #00ffa3; --lv4: #00d18b; --lv3: #00a36c; --lv2: #00754d; --lv1: #00472e;
            --empty: #0d1117; --yellow: #ffff00;
            --bg: #0d0d0d; --surface: #131313; --card: #181818;
            --border: rgba(255,255,255,0.07); --text: #ffffff; --muted: #7a7a7a;
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; height: 100dvh; overflow: hidden; position: fixed; width: 100%; }

        /* Screens */
        .screen { display: none; flex-direction: column; height: 100dvh; opacity: 0; transform: translateY(8px); transition: 0.3s var(--ease); }
        .screen.active { display: flex; opacity: 1; transform: translateY(0); }

        /* Header (368.png Style) */
        header { flex-shrink: 0; padding-top: env(safe-area-inset-top, 36px); background: var(--bg); border-bottom: 1px solid var(--border); }
        .header-top { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px 10px; position: relative; }
        .app-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 0.1em; line-height: 1; color: var(--text); }
        
        .week-nav { position: absolute; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .nav-arrow { background: none; border: none; color: var(--muted); font-size: 10px; cursor: pointer; padding: 2px 10px; }
        .range-label { font-family: 'DM Mono', monospace; font-size: 10px; color: #fff; text-transform: uppercase; }

        .status-box { display: flex; align-items: center; gap: 5px; font-family: 'DM Mono', monospace; font-size: 8px; color: var(--muted); }
        .status-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); }
        .status-dot.syncing { background: var(--yellow); animation: blink 1s infinite; }
        .status-dot.online { background: var(--lv5); box-shadow: 0 0 5px var(--lv5); }
        @keyframes blink { 50% { opacity: 0.3; } }
        
        .settings-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #fff; width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* Grid Section */
        .dow-row { display: grid; grid-template-columns: 32px repeat(7, 1fr); padding: 4px 8px; gap: 3px; }
        .dow-label { text-align: center; font-family: 'DM Mono', monospace; font-size: 8px; color: var(--muted); text-transform: uppercase; }
        .dow-label.today { color: var(--lv5); font-weight: bold; }

        .scroll-area { flex: 1; overflow-y: auto; padding: 4px 8px 100px; }
        .grid-matrix { display: grid; grid-template-columns: 32px repeat(7, 1fr); gap: 3px; }
        .time-label { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); display: flex; align-items: center; justify-content: flex-end; padding-right: 6px; }
        
        .cell { aspect-ratio: 1; border-radius: 3px; background: var(--empty); cursor: pointer; transition: 0.2s; position: relative; border: 1px solid rgba(255,255,255,0.02); }
        .cell:active { transform: scale(0.9); }
        .cell.has-note::after { content: ''; position: absolute; bottom: 2px; right: 2px; width: 3px; height: 3px; background: rgba(255,255,255,0.4); border-radius: 50%; }

        /* Intensity Styles with 368.png Glow */
        .lv-5 { background: var(--lv5) !important; box-shadow: 0 0 16px var(--lv5) !important; z-index: 1; }
        .lv-4 { background: var(--lv4) !important; }
        .lv-3 { background: var(--lv3) !important; }
        .lv-2 { background: var(--lv2) !important; }
        .lv-1 { background: var(--lv1) !important; box-shadow: 0 0 8px var(--lv1); }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: calc(64px + env(safe-area-inset-bottom, 20px)); background: rgba(10,10,10,0.9); backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: flex; padding-bottom: env(safe-area-inset-bottom, 20px); z-index: 100; }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; background: none; border: none; color: var(--muted); font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 0.1em; cursor: pointer; transition: 0.3s; position: relative; opacity: 0.6; }
        .nav-item.active { color: var(--lv5); opacity: 1; }
        .nav-item.active::after { content: ''; position: absolute; bottom: 12px; width: 20px; height: 2px; background: var(--lv5); border-radius: 2px; }

        /* Review Panel (352.png/354.png Style) */
        .panel { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); z-index: 200; transform: translateY(100%); transition: 0.4s var(--ease); display: flex; flex-direction: column; }
        .panel.open { transform: translateY(0); }
        .panel-header { padding: 40px 24px 20px; display: flex; justify-content: space-between; align-items: flex-start; }
        .close-btn { background: rgba(255,255,255,0.1); border: none; color: #fff; width: 40px; height: 40px; border-radius: 50%; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .panel-body { flex: 1; padding: 0 24px 40px; overflow-y: auto; }

        .review-label-top { color: var(--lv5); font-family: 'DM Mono', monospace; font-size: 10px; text-transform: uppercase; display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
        .review-label-top::before { content: '●'; font-size: 8px; }
        .review-title { font-family: 'Bebas Neue', sans-serif; font-size: 42px; line-height: 1; margin-bottom: 4px; }
        .review-subtitle { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; margin-bottom: 30px; letter-spacing: 0.1em; }

        .input-section { margin-bottom: 24px; }
        .input-label { font-family: 'DM Sans', sans-serif; font-size: 11px; margin-bottom: 12px; display: block; font-weight: 500; }
        .memo-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 12px; color: #fff; padding: 16px; font-size: 14px; min-height: 100px; resize: none; outline: none; }
        
        .save-review-btn { width: 100%; padding: 20px; background: var(--lv5); color: #000; border: none; border-radius: 15px; font-family: 'Bebas Neue', sans-serif; font-size: 20px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; letter-spacing: 0.2em; box-shadow: 0 8px 20px rgba(0,255,163,0.3); }

        /* Floating Review Button (351.png Style) */
        .review-fab { position: fixed; bottom: calc(84px + env(safe-area-inset-bottom, 20px)); right: 20px; width: 80px; height: 40px; background: var(--lv5); color: #000; border-radius: 8px; border: none; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-weight: bold; font-size: 16px; box-shadow: 0 8px 20px rgba(0,255,163,0.4); z-index: 90; cursor: pointer; }

        /* Stats Cards */
        .summary-card { background: var(--card); border-radius: 12px; padding: 20px; margin-bottom: 12px; border-left: 4px solid var(--lv5); border: 1px solid var(--border); border-left: 4px solid var(--lv5); }
        .card-date { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); margin-bottom: 10px; }
        .log-item { font-size: 12px; line-height: 1.6; margin-bottom: 4px; }
        .log-item b { color: var(--lv5); margin-right: 6px; }
    </style>
</head>
<body>

<!-- Grid Screen -->
<div id="screen-week" class="screen active">
    <header>
        <div class="header-top">
            <div class="app-title">MOOD LOG</div>
            <div class="week-nav">
                <button class="nav-arrow" onclick="moveWeek(-1)">▲</button>
                <div class="range-label" id="week-range">-- . --</div>
                <button class="nav-arrow" onclick="moveWeek(1)">▼</button>
            </div>
            <div class="header-right">
                <div class="status-box">
                    <div id="sync-dot" class="status-dot"></div>
                    <span id="sync-text">IDLE</span>
                </div>
                <button class="settings-btn" onclick="manualSync()">⚙</button>
            </div>
        </div>
        <div class="dow-row" id="dow-header"></div>
    </header>
    <div class="scroll-area">
        <div class="grid-matrix" id="grid-area"></div>
    </div>
</div>

<!-- Weekly Summary Screen -->
<div id="screen-summary" class="screen">
    <header><div class="header-top"><div class="app-title">WKLY</div></div></header>
    <div style="padding: 24px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; align-items: flex-end; justify-content: space-between;">
        <div>
            <div class="review-subtitle">Weekly Performance</div>
            <div class="review-title" id="wkly-avg" style="font-size: 64px;">0.00</div>
        </div>
        <div style="background: var(--lv5); width: 48px; height: 48px; border-radius: 12px; box-shadow: 0 0 15px var(--lv5);"></div>
    </div>
    <div class="scroll-area" id="summary-content"></div>
    <button class="review-fab" onclick="openReview('wkly')">REVIEW</button>
</div>

<!-- Monthly Summary Screen -->
<div id="screen-month" class="screen">
    <header><div class="header-top"><div class="app-title">MONTH</div></div></header>
    <div style="padding: 24px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; align-items: flex-end; justify-content: space-between;">
        <div>
            <div class="review-subtitle">Monthly Performance</div>
            <div class="review-title" id="month-avg" style="font-size: 64px;">0.00</div>
        </div>
        <div style="background: var(--lv5); width: 48px; height: 48px; border-radius: 12px; box-shadow: 0 0 15px var(--lv5);"></div>
    </div>
    <div class="scroll-area" id="month-content"></div>
    <button class="review-fab" onclick="openReview('month')">REVIEW</button>
</div>

<!-- Bottom Navigation -->
<nav class="bottom-nav">
    <button class="nav-item active" id="tab-week" onclick="switchTab('week')">GRID</button>
    <button class="nav-item" id="tab-summary" onclick="switchTab('summary')">WKLY</button>
    <button class="nav-item" id="tab-month" onclick="switchTab('month')">MONTH</button>
</nav>

<!-- Detail Panel -->
<div id="panel-detail" class="panel">
    <div class="panel-header">
        <div>
            <div class="review-title" id="d-time">00:00</div>
            <div class="review-subtitle" id="d-date">-- . -- . ----</div>
        </div>
        <button class="close-btn" onclick="closePanel()">✕</button>
    </div>
    <div class="panel-body">
        <div class="review-subtitle" style="margin-bottom: 12px;">Intensity</div>
        <div style="display: flex; gap: 8px; margin-bottom: 24px;" id="intensity-row"></div>
        <div class="review-subtitle" style="margin-bottom: 12px;">Memo</div>
        <textarea id="memo-input" class="memo-input" placeholder="今の気分やログを記録..."></textarea>
        <button class="save-review-btn" onclick="saveDetail()">SAVE TO CLOUD</button>
    </div>
</div>

<!-- Review Panel (352.png/354.png Style) -->
<div id="panel-review" class="panel">
    <div class="panel-header">
        <div>
            <div class="review-label-top">Review</div>
            <div class="review-title" id="r-title">WKLY</div>
            <div class="review-subtitle">INSIGHT & KPT</div>
        </div>
        <button class="close-btn" onclick="closePanel()">✕</button>
    </div>
    <div class="panel-body">
        <div class="input-section">
            <span class="input-label" style="color: var(--lv5);">KEEP (継続したい成功要因)</span>
            <textarea id="r-keep" class="memo-input" placeholder="良かったこと、続けること"></textarea>
        </div>
        <div class="input-section">
            <span class="input-label" style="color: #ff4444;">PROBLEM (改善が必要な課題)</span>
            <textarea id="r-prob" class="memo-input" placeholder="課題、障害、反省点"></textarea>
        </div>
        <div class="input-section">
            <span class="input-label" style="color: #00d2ff;">TRY (次へのアクション)</span>
            <textarea id="r-try" class="memo-input" placeholder="次に試すこと、具体的な行動"></textarea>
        </div>
        <button class="save-review-btn" onclick="saveReview()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            SAVE REVIEW
        </button>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyUSkMWv6L3r2WxJfCXzTX7v5etbYtnPc0nuVoTQeJq1PItiQadSVnvP__LLvbbDnz8gQ/exec";
    
    function ds(d) { return d.toISOString().split('T')[0]; }
    function monday(d){ const t=new Date(d); t.setHours(0,0,0,0); const dw=t.getDay(); t.setDate(t.getDate()+(dw===0?-6:1-dw)); return t; }

    let ST = {
        weekStart: monday(new Date()),
        data: JSON.parse(localStorage.getItem('nimo-v6-matrix-data') || '{}'),
        tab: 'week',
        selDs: '', selH: 0, revType: ''
    };

    window.onload = async () => {
        renderWeek();
        await fetchCloudData();
        refreshTab();
    };

    async function fetchCloudData() {
        const dot = document.getElementById('sync-dot');
        const text = document.getElementById('sync-text');
        dot.className = "status-dot syncing";
        text.textContent = "LOADING...";
        try {
            const res = await fetch(GAS_URL);
            const result = await res.json();
            if (result.data) {
                // クラウドデータを優先的に深くマージ
                for (let key in result.data) {
                    if (key.startsWith('review-')) {
                        ST.data[key] = Object.assign({}, ST.data[key] || {}, result.data[key]);
                    } else {
                        if (!ST.data[key]) ST.data[key] = { slots: {} };
                        ST.data[key].slots = Object.assign({}, result.data[key].slots, ST.data[key].slots);
                    }
                }
                localStorage.setItem('nimo-v6-matrix-data', JSON.stringify(ST.data));
                dot.className = "status-dot online";
                text.textContent = "IDLE";
                refreshTab();
            }
        } catch(e) {
            dot.className = "status-dot";
            text.textContent = "OFFLINE";
        }
    }

    async function syncToSheets() {
        document.getElementById('sync-text').textContent = "SYNCING...";
        document.getElementById('sync-dot').className = "status-dot syncing";
        try {
            await fetch(GAS_URL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify({ action: 'sync', data: ST.data }) 
            });
            setTimeout(fetchCloudData, 1200);
        } catch(e) { console.error(e); }
    }

    function renderWeek() {
        const now = new Date();
        const todayDs = ds(now);
        const days = Array.from({length:7}, (_,i) => { const d=new Date(ST.weekStart); d.setDate(d.getDate()+i); return d; });
        
        const monthNames = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
        document.getElementById('week-range').textContent = `${days[0].getDate()}-${days[6].getDate()} ${monthNames[ST.weekStart.getMonth()]}`;
        
        const header = document.getElementById('dow-header');
        header.innerHTML = '<div></div>' + days.map(d => `
            <div class="dow-label ${ds(d)===todayDs?'today':''}">
                ${['MON','TUE','WED','THU','FRI','SAT','SUN'][(d.getDay()+6)%7]}<br>${d.getDate()}
            </div>`).join('');

        const grid = document.getElementById('grid-area');
        grid.innerHTML = '';
        for (let h=8; h<=19; h++) {
            const tl = document.createElement('div');
            tl.className = 'time-label'; tl.textContent = h;
            grid.appendChild(tl);
            days.forEach(d => {
                const dstr = ds(d);
                const lv = ST.data[dstr]?.slots?.[h]?.level;
                const cell = document.createElement('div');
                cell.className = 'cell' + (lv ? ` lv-${lv}` : '');
                if (ST.data[dstr]?.slots?.[h]?.note) cell.classList.add('has-note');
                cell.onclick = () => openDetail(d, h);
                grid.appendChild(cell);
            });
        }
    }

    function renderSummary() {
        const days = Array.from({length:7}, (_,i) => { const d=new Date(ST.weekStart); d.setDate(d.getDate()+i); return d; });
        let sum=0, count=0, html='';
        days.forEach(d => {
            const dstr = ds(d);
            const slots = ST.data[dstr]?.slots || {};
            let dSum=0, dCnt=0, dLogs=[];
            Object.keys(slots).forEach(h => {
                const s = slots[h];
                if (s.level) { dSum+=s.level; dCnt++; sum+=s.level; count++; }
                if (s.note) dLogs.push(`<div class="log-item"><b>[${h}:00]</b> ${s.note}</div>`);
            });
            if (dLogs.length) {
                html += `<div class="summary-card">
                    <div class="card-date">${d.getDate()} ${['SUN','MON','TUE','WED','THU','FRI','SAT'][d.getDay()]}</div>
                    <div>${dLogs.join('')}</div>
                </div>`;
            }
        });
        document.getElementById('wkly-avg').textContent = count ? (sum/count).toFixed(2) : "0.00";
        document.getElementById('summary-content').innerHTML = html || '<div style="text-align:center; padding:40px; color:var(--muted)">NO LOGS</div>';
    }

    function renderMonth() {
        const start = new Date(ST.weekStart.getFullYear(), ST.weekStart.getMonth(), 1);
        const end = new Date(ST.weekStart.getFullYear(), ST.weekStart.getMonth()+1, 0);
        let html = '<div style="display:grid; grid-template-columns:repeat(7,1fr); gap:5px;">';
        let totalSum = 0, totalCount = 0;
        for (let d=1; d<=end.getDate(); d++) {
            const dstr = ds(new Date(start.getFullYear(), start.getMonth(), d));
            const slots = ST.data[dstr]?.slots || {};
            let s=0, c=0; Object.values(slots).forEach(v => { if(v.level){s+=v.level; c++} });
            const avg = c ? (s/c) : 0;
            if (avg > 0) { totalSum += avg; totalCount++; }
            html += `<div class="cell ${avg?`lv-${Math.round(avg)}`:''}" style="aspect-ratio:1; display:flex; align-items:center; justify-content:center; font-family:'Bebas Neue',sans-serif; font-size:16px; color:${avg>3?'#000':'#fff'}">${d}</div>`;
        }
        document.getElementById('month-avg').textContent = totalCount ? (totalSum/totalCount).toFixed(2) : "0.00";
        document.getElementById('month-content').innerHTML = html + '</div>';
    }

    function openDetail(d, h) {
        ST.selDs = ds(d); ST.selH = h;
        document.getElementById('d-time').textContent = `${h}:00`;
        document.getElementById('d-date').textContent = ST.selDs;
        document.getElementById('memo-input').value = ST.data[ST.selDs]?.slots?.[h]?.note || '';
        const row = document.getElementById('intensity-row');
        row.innerHTML = '';
        [5,4,3,2,1].forEach(l => {
            const btn = document.createElement('div');
            btn.className = 'lv-btn' + (ST.data[ST.selDs]?.slots?.[h]?.level === l ? ' selected' : '');
            btn.style.background = `var(--lv${l})`;
            btn.onclick = () => {
                if (!ST.data[ST.selDs]) ST.data[ST.selDs] = { slots: {} };
                ST.data[ST.selDs].slots[h] = { ...ST.data[ST.selDs].slots[h], level: l };
                openDetail(d, h);
            };
            row.appendChild(btn);
        });
        document.getElementById('panel-detail').classList.add('open');
    }

    function openReview(type) {
        ST.revType = type;
        const key = `review-${type==='wkly'?'w':'m'}-${ST.weekStart.getFullYear()}-${type==='wkly'? Math.ceil(ST.weekStart.getDate()/7) : ST.weekStart.getMonth()+1}`;
        const r = ST.data[key] || {};
        document.getElementById('r-title').textContent = type.toUpperCase();
        document.getElementById('r-keep').value = r.keep||'';
        document.getElementById('r-prob').value = r.prob||'';
        document.getElementById('r-try').value = r.try||'';
        document.getElementById('panel-review').classList.add('open');
    }

    function saveDetail() {
        if (ST.data[ST.selDs]?.slots?.[ST.selH]) ST.data[ST.selDs].slots[ST.selH].note = document.getElementById('memo-input').value;
        localStorage.setItem('nimo-v6-matrix-data', JSON.stringify(ST.data));
        closePanel(); refreshTab(); syncToSheets();
    }

    function saveReview() {
        const key = `review-${ST.revType==='wkly'?'w':'m'}-${ST.weekStart.getFullYear()}-${ST.revType==='wkly'? Math.ceil(ST.weekStart.getDate()/7) : ST.weekStart.getMonth()+1}`;
        ST.data[key] = {
            keep: document.getElementById('r-keep').value,
            prob: document.getElementById('r-prob').value,
            try: document.getElementById('r-try').value
        };
        localStorage.setItem('nimo-v6-matrix-data', JSON.stringify(ST.data));
        closePanel(); syncToSheets();
    }

    function switchTab(t) {
        ST.tab = t;
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(`screen-${t}`).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(b => {
            b.classList.remove('active');
            if (b.id === `tab-${t}`) b.classList.add('active');
        });
        refreshTab();
    }

    function refreshTab() {
        if (ST.tab === 'week') renderWeek();
        else if (ST.tab === 'summary') renderSummary();
        else renderMonth();
    }

    function closePanel() { document.querySelectorAll('.panel').forEach(p => p.classList.remove('open')); }
    function moveWeek(n) { ST.weekStart.setDate(ST.weekStart.getDate() + (n * 7)); renderWeek(); refreshTab(); }
    function manualSync() { fetchCloudData(); }
</script>
</body>
</html>
