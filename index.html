<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="NIMOGRAM">
    <meta name="theme-color" content="#0d0d0d">
    <title>NIMOGRAM LOG</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;700&display=swap');

        :root {
            --lv5: #00ffa3; 
            --lv4: #00d18b; 
            --lv3: #00a36c; 
            --lv2: #00754d; 
            --lv1: #00472e;
            --emerald: #50C878; 
            --orange: #FFA500;  
            --empty: #0d1117; 
            --yellow: #ffff00;
            --bg: #0d0d0d; 
            --surface: #131313; 
            --card: #181818;
            --border: rgba(255,255,255,0.07); 
            --text: #ffffff; 
            --muted: #7a7a7a;
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; height: 100dvh; overflow: hidden; position: fixed; width: 100%; }

        /* Screens */
        .screen { display: none; flex-direction: column; height: 100dvh; opacity: 0; transform: translateY(8px); transition: 0.3s var(--ease); }
        .screen.active { display: flex; opacity: 1; transform: translateY(0); }

        /* Header (368.png Style) */
        header { flex-shrink: 0; padding-top: env(safe-area-inset-top, 36px); background: var(--bg); position: relative; }
        .header-top { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px 10px; }
        .app-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 0.1em; line-height: 1; color: var(--text); }
        
        .week-display { position: absolute; left: 50%; top: 60%; transform: translate(-50%, -50%); text-align: center; pointer-events: none; }
        .range-text { font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; color: #fff; text-transform: uppercase; }

        /* Side Nav */
        .side-nav-btn {
            position: absolute;
            top: 50%;
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            color: var(--muted);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            transition: all 0.2s;
            font-size: 20px;
            font-weight: 500; /* Button Normal Weight */
        }
        .side-nav-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.1); color: #fff; }
        .side-nav-btn.prev { left: 16px; transform: translateY(-50%); }
        .side-nav-btn.next { right: 16px; transform: translateY(-50%); }

        .header-right { display: flex; align-items: center; gap: 12px; }
        .sync-info { display: flex; align-items: center; gap: 5px; font-family: 'DM Mono', monospace; font-size: 7px; color: var(--muted); }
        .status-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--muted); }
        .status-dot.online { background: var(--lv5); box-shadow: 0 0 5px var(--lv5); }
        .status-dot.syncing { background: var(--yellow); animation: pulse 1s infinite; }
        @keyframes pulse { 50% { opacity: 0.3; } }
        
        .settings-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #fff; width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* Grid */
        .dow-row { display: grid; grid-template-columns: 32px repeat(7, 1fr); padding: 0 8px; margin-bottom: 6px; }
        .dow-label { text-align: center; font-family: 'DM Mono', monospace; font-size: 8px; color: var(--muted); text-transform: uppercase; }
        .dow-label.today { color: var(--lv5); font-weight: bold; }

        .scroll-container { flex: 1; overflow-y: auto; padding: 0 8px 100px; }
        .grid-matrix { display: grid; grid-template-columns: 32px repeat(7, 1fr); gap: 6px; } 
        .time-label { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; }
        
        .cell { aspect-ratio: 1; border-radius: 4px; background: var(--empty); cursor: pointer; transition: 0.2s; position: relative; }
        .cell:active { transform: scale(0.9); }
        .cell.has-note::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 3px; height: 3px; background: rgba(255,255,255,0.4); border-radius: 50%; }

        .lv-5 { background: var(--lv5) !important; box-shadow: 0 0 18px 2px var(--lv5), inset 0 0 10px rgba(255,255,255,0.4) !important; z-index: 1; }
        .lv-4 { background: var(--lv4) !important; }
        .lv-3 { background: var(--lv3) !important; }
        .lv-2 { background: var(--lv2) !important; }
        .lv-1 { background: var(--lv1) !important; box-shadow: 0 0 8px var(--lv1); }

        /* Animations */
        .char-reveal { display: inline-block; opacity: 0; transform: translateY(5px); animation: charIn 0.4s forwards; }
        @keyframes charIn { to { opacity: 1; transform: translateY(0); } }

        /* Bottom Nav - Thinner Blur */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: calc(64px + env(safe-area-inset-bottom, 20px)); background: rgba(10,10,10,0.85); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border-top: 1px solid var(--border); display: flex; padding-bottom: env(safe-area-inset-bottom, 20px); z-index: 100; }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; background: none; border: none; color: var(--muted); font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 0.1em; cursor: pointer; transition: 0.3s; position: relative; opacity: 0.6; font-weight: 400; }
        .nav-item.active { color: var(--lv5); opacity: 1; }
        .nav-item.active::after { content: ''; position: absolute; bottom: 12px; width: 24px; height: 2px; background: var(--lv5); border-radius: 2px; }

        /* Summaries */
        .stats-summary { padding: 24px 20px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 12px; }
        .stats-main-score { font-family: 'Bebas Neue', sans-serif; font-size: 82px; line-height: 0.8; color: var(--lv5); min-width: 150px; }
        .stats-insight { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 12px; padding: 18px; font-size: 11px; line-height: 1.6; margin: 0 20px 20px; color: var(--text); }
        
        /* Panels - Thinner Blur */
        .panel { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 200; transform: translateY(100%); transition: 0.4s var(--ease); display: flex; column; }
        .panel.open { transform: translateY(0); }
        .panel-content { padding: 44px 24px 64px; max-width: 430px; margin: 0 auto; width: 100%; height: 100%; display: flex; flex-direction: column; position: relative; }
        .panel-close { position: absolute; top: 30px; right: 20px; width: 40px; height: 40px; border-radius: 12px; background: rgba(255,255,255,0.1); border: 1px solid var(--border); color: #fff; font-size: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        .label-top { color: var(--lv5); font-family: 'DM Mono', monospace; font-size: 10px; text-transform: uppercase; display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
        .label-top::before { content: '●'; font-size: 8px; }
        .detail-day-num { font-family: 'Bebas Neue', sans-serif; font-size: 72px; line-height: 0.8; color: var(--text); }
        .detail-time-green { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: var(--lv5); margin-bottom: 4px; }
        .detail-full-date { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; margin-bottom: 30px; }
        
        .log-line { font-size: 12px; line-height: 1.8; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
        .log-line.lv-5-text { color: var(--emerald); font-weight: 500; }
        .log-line.lv-1-text { color: var(--orange); font-weight: 500; }
        .level-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

        .intensity-grid { display: flex; gap: 10px; margin-bottom: 30px; }
        .lv-box { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
        .lv-color-sq { width: 100%; aspect-ratio: 1; border-radius: 10px; border: 2px solid transparent; transition: 0.2s; }
        .lv-box.selected .lv-color-sq { border-color: #fff; transform: scale(1.05); }

        .lv-label-sub { font-family: 'DM Mono', monospace; font-size: 5px; color: var(--muted); text-transform: uppercase; font-weight: 400; letter-spacing: 0.05em; }

        .memo-input { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 15px; color: #fff; padding: 20px; font-size: 14px; resize: none; min-height: 100px; outline: none; margin-bottom: 24px; font-family: inherit; }
        .main-save-btn { width: 100%; padding: 22px; background: var(--lv5); color: #000; border: none; border-radius: 15px; font-family: 'Bebas Neue', sans-serif; font-size: 24px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; }

        .review-fab { position: fixed; bottom: calc(84px + env(safe-area-inset-bottom, 20px)); right: 20px; width: 84px; height: 44px; background: var(--lv5); color: #000; border-radius: 12px; border: none; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-weight: 500; font-size: 16px; box-shadow: 0 8px 20px rgba(0,255,163,0.4); z-index: 90; cursor: pointer; }
        
        .card-item { background: var(--card); border-radius: 14px; padding: 18px 20px; margin: 0 20px 12px; border-left: 5px solid var(--lv5); border: 1px solid var(--border); border-left-width: 5px; }
        .card-date { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }

        .review-summary-row { display: flex; gap: 12px; margin-bottom: 16px; }
        .impact-card { flex: 1; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 12px; padding: 12px; text-align: center; }
        .impact-val { font-family: 'Bebas Neue', sans-serif; font-size: 32px; line-height: 1; margin-bottom: 4px; }
        .impact-label { font-family: 'DM Mono', monospace; font-size: 8px; color: var(--muted); text-transform: uppercase; }
        .impact-commentary { font-size: 10px; line-height: 1.5; color: var(--text); padding: 12px; background: rgba(255,255,255,0.02); border-radius: 10px; margin-bottom: 24px; border-left: 2px solid var(--lv5); }

        .date-label-sub { position: absolute; top: 2px; left: 3px; font-family: 'DM Mono', monospace; font-size: 7px; color: var(--muted); opacity: 0.6; pointer-events: none; }
    </style>
</head>
<body>

<!-- GRID -->
<div id="screen-week" class="screen active">
    <header>
        <button class="side-nav-btn prev" onclick="moveWeek(-1)">‹</button>
        <div class="header-top">
            <div class="app-title">MOOD LOG</div>
            <div class="week-display"><div class="range-text" id="week-range">-- . --</div></div>
            <div class="header-right">
                <div class="sync-info"><div id="sync-dot" class="status-dot"></div><span id="sync-text">IDLE</span></div>
                <button class="settings-btn" onclick="openSettings()">⚙</button>
            </div>
        </div>
        <button class="side-nav-btn next" onclick="moveWeek(1)">›</button>
        <div class="dow-row" id="dow-header" style="margin-top: 10px;"></div>
    </header>
    <div class="scroll-container"><div class="grid-matrix" id="grid-area"></div></div>
</div>

<!-- WKLY -->
<div id="screen-summary" class="screen">
    <header><div class="header-top"><div class="app-title">WKLY</div></div></header>
    <div class="scroll-container" id="summary-content"></div>
    <button class="review-fab" onclick="openReview('wkly')">REVIEW</button>
</div>

<!-- MONTH -->
<div id="screen-month" class="screen">
    <header><div class="header-top"><div class="app-title">MONTH</div></div></header>
    <div class="scroll-container" id="month-content"></div>
    <button class="review-fab" onclick="openReview('month')">REVIEW</button>
</div>

<nav class="bottom-nav">
    <button class="nav-item active" id="tab-week" onclick="switchTab('week')">GRID</button>
    <button class="nav-item" id="tab-summary" onclick="switchTab('summary')">WKLY</button>
    <button class="nav-item" id="tab-month" onclick="switchTab('month')">MONTH</button>
</nav>

<!-- DETAIL -->
<div id="panel-detail" class="panel">
    <div class="panel-content">
        <button class="panel-close" onclick="closePanel()">✕</button>
        <div class="label-top">LOG</div>
        <div class="detail-day-num" id="d-day-num">--</div>
        <div class="detail-time-green" id="d-time">00:00</div>
        <div class="detail-full-date" id="d-date">--- . --- ----</div>
        <div class="intensity-grid" id="intensity-grid"></div>
        <textarea id="memo-input" class="memo-input" placeholder="Notes..."></textarea>
        <button class="main-save-btn" onclick="saveDetail()">SAVE TO CLOUD</button>
    </div>
</div>

<!-- REVIEW -->
<div id="panel-review" class="panel">
    <div class="panel-content">
        <button class="panel-close" onclick="closePanel()">✕</button>
        <div class="label-top">REVIEW</div>
        <div class="detail-day-num" id="r-title" style="font-size: 42px;">WKLY</div>
        
        <div id="review-commentary-area"></div>
        <div class="review-summary-row" id="review-impact-summary"></div>
        
        <div style="flex: 1; overflow-y: auto; padding-right: 4px;">
            <span class="label-top" style="color:var(--lv5)">KEEP</span>
            <textarea id="r-keep" class="memo-input" placeholder="継続したい成功要因"></textarea>
            <span class="label-top" style="color:#ff4444">PROBLEM</span>
            <textarea id="r-prob" class="memo-input" placeholder="改善が必要な課題"></textarea>
            <span class="label-top" style="color:#00d2ff">TRY / 10X REFLECTION</span>
            <textarea id="r-try" class="memo-input" style="min-height:160px;" placeholder="次へのアクション & 10Xの振り返り"></textarea>
        </div>
        <button class="main-save-btn" onclick="saveReview()">SAVE REVIEW</button>
    </div>
</div>

<!-- SETTINGS -->
<div id="panel-settings" class="panel">
    <div class="panel-content">
        <button class="panel-close" onclick="closePanel()">✕</button>
        <div class="label-top">SYSTEM</div>
        <div class="detail-day-num" style="font-size: 42px;">SETTINGS</div>
        <div style="background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px;">
            <div class="label-top">GAS ENDPOINT</div>
            <input type="text" id="gas-url-input" style="width:100%; background:transparent; border:none; color:#fff; font-family:'DM Mono',monospace; font-size:10px; padding:10px 0; outline:none;" readonly>
        </div>
        <button class="main-save-btn" style="background:rgba(255,255,255,0.1); color:#fff;" onclick="fetchCloudData()">MANUAL SYNC</button>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyUSkMWv6L3r2WxJfCXzTX7v5etbYtnPc0nuVoTQeJq1PItiQadSVnvP__LLvbbDnz8gQ/exec";
    
    const getJSTDate = () => {
        const d = new Date();
        const utc = d.getTime() + (d.getTimezoneOffset() * 60000);
        return new Date(utc + (9 * 60 * 60000));
    };

    function ds(dateObj) {
        const y = dateObj.getFullYear();
        const m = String(dateObj.getMonth() + 1).padStart(2, '0');
        const day = String(dateObj.getDate()).padStart(2, '0');
        return `${y}-${m}-${day}`;
    }

    function monday(d){ 
        const t = d ? new Date(d) : getJSTDate();
        t.setHours(0,0,0,0);
        const dw = t.getDay(); 
        t.setDate(t.getDate() + (dw === 0 ? -6 : 1 - dw));
        return t;
    }

    let ST = {
        weekStart: monday(getJSTDate()),
        data: JSON.parse(localStorage.getItem('nimo-v6-matrix-data') || '{}'),
        tab: 'week', selDs: '', selH: 0, revType: ''
    };

    const revealScore = (el, score) => {
        el.innerHTML = '';
        score.toString().split('').forEach((char, i) => {
            const span = document.createElement('span');
            span.className = 'char-reveal'; span.textContent = char;
            span.style.animationDelay = `${i * 0.1}s`;
            el.appendChild(span);
        });
    };

    window.onload = async () => {
        document.getElementById('gas-url-input').value = GAS_URL;
        renderWeek(); await fetchCloudData(); refreshTab();
    };

    async function fetchCloudData() {
        const dot = document.getElementById('sync-dot');
        const text = document.getElementById('sync-text');
        dot.className = "status-dot syncing"; text.textContent = "LOADING...";
        try {
            const res = await fetch(GAS_URL);
            const result = await res.json();
            if (result.data) {
                for (let key in result.data) {
                    if (key.startsWith('review-')) {
                        ST.data[key] = Object.assign({}, ST.data[key] || {}, result.data[key]);
                    } else {
                        if (!ST.data[key]) ST.data[key] = { slots: {} };
                        ST.data[key].slots = Object.assign({}, result.data[key].slots, ST.data[key].slots);
                    }
                }
                localStorage.setItem('nimo-v6-matrix-data', JSON.stringify(ST.data));
                dot.className = "status-dot online"; text.textContent = "IDLE";
                refreshTab();
            }
        } catch(e) { dot.className = "status-dot"; text.textContent = "OFFLINE"; }
    }

    async function syncToSheets() {
        document.getElementById('sync-dot').className = "status-dot syncing";
        try {
            await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'sync', data: ST.data }) });
            setTimeout(fetchCloudData, 1200);
        } catch(e) {}
    }

    function renderWeek() {
        const now = getJSTDate();
        const days = Array.from({length:7}, (_,i) => { const d=new Date(ST.weekStart); d.setDate(d.getDate()+i); return d; });
        const mNames = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
        document.getElementById('week-range').textContent = `${days[0].getDate()}-${days[6].getDate()} ${mNames[ST.weekStart.getMonth()]}`;
        
        const header = document.getElementById('dow-header');
        header.innerHTML = '<div></div>' + days.map(d => `<div class="dow-label ${ds(d)===ds(now)?'today':''}">${['MON','TUE','WED','THU','FRI','SAT','SUN'][(d.getDay()+6)%7]}<br>${d.getDate()}</div>`).join('');

        const grid = document.getElementById('grid-area'); grid.innerHTML = '';
        const cellH = Math.max(Math.floor((window.innerHeight - 240) / 12), 34);

        for (let h=8; h<=19; h++) {
            const tl = document.createElement('div'); tl.className = 'time-label'; tl.textContent = h; tl.style.height = cellH + 'px'; grid.appendChild(tl);
            days.forEach(d => {
                const dstr = ds(d);
                const lv = ST.data[dstr]?.slots?.[h]?.level;
                const cell = document.createElement('div');
                cell.className = 'cell' + (lv ? ` lv-${lv}` : '');
                cell.style.height = cellH + 'px';
                if (ST.data[dstr]?.slots?.[h]?.note) cell.classList.add('has-note');
                cell.onclick = () => openDetail(d, h);
                grid.appendChild(cell);
            });
        }
    }

    function renderSummary() {
        const days = Array.from({length:7}, (_,i) => { const d=new Date(ST.weekStart); d.setDate(d.getDate()+i); return d; });
        let sum=0, count=0, html='';
        days.forEach(d => {
            const dstr = ds(d);
            const slots = ST.data[dstr]?.slots || {};
            let dSum=0, dCnt=0, dLogs=[];
            Object.keys(slots).sort((a,b)=>parseInt(a)-parseInt(b)).forEach(h => {
                const s = slots[h];
                if (s.level) { dSum+=s.level; dCnt++; sum+=s.level; count++; }
                if (s.note) {
                    let cls = '';
                    if (s.level === 5) cls = 'lv-5-text';
                    else if (s.level === 1) cls = 'lv-1-text';
                    dLogs.push(`<div class="log-line ${cls}"><div class="level-dot" style="background:var(--lv${s.level})"></div><b>[${h}:00]</b> ${s.note}</div>`);
                }
            });
            if (dLogs.length) {
                const dayAvg = dCnt ? (dSum/dCnt) : 1;
                html += `<div class="card-item" style="border-left-color: var(--lv${Math.round(dayAvg)})">
                    <div class="card-date">${d.getDate()} ${['SUN','MON','TUE','WED','THU','FRI','SAT'][d.getDay()]}</div>
                    <div>${dLogs.join('')}</div>
                </div>`;
            }
        });

        const avg = count ? (sum/count).toFixed(2) : "0.00";
        document.getElementById('summary-content').innerHTML = `
            <div class="stats-summary">
                <div><div class="label-top">Weekly Performance</div><div class="stats-main-score" id="wk-score">0.00</div></div>
                <div style="background:var(--lv5); width:48px; height:48px; border-radius:12px; box-shadow: 0 0 15px var(--lv5);"></div>
            </div>
            <div class="stats-insight">💎 週間レポ：平均スコア ${avg}。LV5のエメラルド、LV1のオレンジに着目してください。</div>
            ${html || '<div style="text-align:center; padding:40px; color:var(--muted)">NO DATA</div>'}
        `;
        revealScore(document.getElementById('wk-score'), avg);
    }

    function renderMonth() {
        const start = new Date(ST.weekStart.getFullYear(), ST.weekStart.getMonth(), 1);
        const end = new Date(ST.weekStart.getFullYear(), ST.weekStart.getMonth()+1, 0);
        let gridHtml = '<div style="display:grid; grid-template-columns:repeat(7,1fr); gap:6px; padding: 0 20px;">';
        let totalSum=0, totalCount=0;

        for (let d=1; d<=end.getDate(); d++) {
            const curDate = new Date(start.getFullYear(), start.getMonth(), d);
            const dstr = ds(curDate);
            const slots = ST.data[dstr]?.slots || {};
            let s=0, c=0; 
            Object.values(slots).forEach(v => { if(v.level){s+=v.level; c++} });
            const avg = c ? (s/c) : 0; 
            if(avg > 0) { totalSum += avg; totalCount++; }
            
            gridHtml += `<div class="cell ${avg?`lv-${Math.round(avg)}`:''}" style="aspect-ratio:1; display:flex; align-items:center; justify-content:center; font-family:'Bebas Neue',sans-serif; font-size:16px; color:${avg>3?'#000':'#fff'}" onclick="jumpToWeekReview('${curDate.toISOString()}')">
                <span class="date-label-sub">${d}</span>
                ${avg ? avg.toFixed(1) : ''}
            </div>`;
        }
        
        const mAvg = totalCount ? (totalSum/totalCount).toFixed(2) : "0.00";
        document.getElementById('month-content').innerHTML = `
            <div class="stats-summary">
                <div><div class="label-top">Monthly Performance</div><div class="stats-main-score" id="mo-score">0.00</div></div>
                <div style="background:var(--lv5); width:48px; height:48px; border-radius:12px; box-shadow: 0 0 15px var(--lv5);"></div>
            </div>
            <div class="stats-insight">🌙 月間レポ：平均スコア ${mAvg}。月全体のコンディション推移を俯瞰し、次月の戦略を練りましょう。</div>
            ${gridHtml}</div>`;
        revealScore(document.getElementById('mo-score'), mAvg);
    }

    function jumpToWeekReview(iso) {
        ST.weekStart = monday(new Date(iso)); switchTab('summary');
        setTimeout(() => openReview('wkly'), 150);
    }

    function openDetail(d, h) {
        ST.selDs = ds(d); ST.selH = h;
        document.getElementById('d-day-num').textContent = d.getDate();
        document.getElementById('d-time').textContent = `${String(h).padStart(2,'0')}:00`;
        const mNames = ['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];
        document.getElementById('d-date').textContent = `${mNames[d.getMonth()]} ${d.getFullYear()}`;
        document.getElementById('memo-input').value = ST.data[ST.selDs]?.slots?.[h]?.note || '';
        
        const grid = document.getElementById('intensity-grid'); grid.innerHTML = '';
        [1,2,3,4,5].reverse().forEach(l => {
            const box = document.createElement('div');
            box.className = 'lv-box' + (ST.data[ST.selDs]?.slots?.[h]?.level === l ? ' selected' : '');
            box.innerHTML = `<div class="lv-color-sq" style="background:var(--lv${l})"></div><div class="lv-label-sub">${['BAD','LOW','FAIR','GOOD','PEAK'][l-1]}</div>`;
            box.onclick = () => {
                if (!ST.data[ST.selDs]) ST.data[ST.selDs] = { slots: {} };
                ST.data[ST.selDs].slots[h] = { ...ST.data[ST.selDs].slots[h], level: l };
                openDetail(d, h);
            };
            grid.appendChild(box);
        });
        document.getElementById('panel-detail').classList.add('open');
    }

    function openReview(type) {
        ST.revType = type;
        const key = `review-${type==='wkly'?'w':'m'}-${ds(ST.weekStart)}`;
        const r = ST.data[key] || {};
        
        let lv1Count = 0, lv5Count = 0;
        const isMonth = type === 'month';
        const scanPeriod = isMonth ? 31 : 7;
        const start = isMonth ? new Date(ST.weekStart.getFullYear(), ST.weekStart.getMonth(), 1) : new Date(ST.weekStart);
        
        let monthLogsHtml = "";
        
        for(let i=0; i<scanPeriod; i++) {
            const d = new Date(start); d.setDate(d.getDate() + i);
            if (isMonth && d.getMonth() !== start.getMonth()) break;
            const dsKey = ds(d);
            const slots = ST.data[dsKey]?.slots || {};
            Object.keys(slots).sort((a,b)=>parseInt(a)-parseInt(b)).forEach(h => {
                const s = slots[h];
                if(s.level === 1) lv1Count++;
                if(s.level === 5) lv5Count++;
                
                if (isMonth && s.note && (s.level === 1 || s.level === 5)) {
                    let cls = s.level === 5 ? 'lv-5-text' : 'lv-1-text';
                    monthLogsHtml += `<div class="log-line ${cls}" style="margin-bottom:8px; font-size:11px;">
                        <div class="level-dot" style="background:var(--lv${s.level})"></div>
                        <b>${d.getDate()}日 ${h}:00</b> ${s.note}
                    </div>`;
                }
            });
        }
        
        if (isMonth) {
            // MONTH: Show specific comments for LV1 and LV5 instead of secretary insight
            document.getElementById('review-commentary-area').innerHTML = `
                <div class="label-top" style="margin-bottom:12px;">Monthly LV1 & LV5 Logs</div>
                <div class="impact-commentary" style="max-height: 200px; overflow-y: auto;">
                    ${monthLogsHtml || '<div style="color:var(--muted); font-size:10px;">NO LV1/LV5 LOGS THIS MONTH</div>'}
                </div>
            `;
        } else {
            // WEEKLY: Show secretary commentary
            let impactComment = "";
            if (lv5Count > 3) impactComment += `<span style="color:var(--emerald)">● PEAK状態が${lv5Count}回！攻めの運勢を完全に掴んでいますよ。</span><br>`;
            else impactComment += "● PEAKの出現を増やして、非連続な成果を狙いましょう。<br>";
            
            if (lv1Count > 2) impactComment += `<span style="color:var(--orange)">● 警告：LV1が${lv1Count}回検知されました。体の運勢が低下中。休息が必要です。</span>`;
            else impactComment += "● 規律ある管理により、低コンディションが抑えられています。";

            document.getElementById('review-commentary-area').innerHTML = `
                <div class="impact-commentary">${impactComment}</div>
            `;
        }

        // Hide impact cards for month review as requested
        document.getElementById('review-impact-summary').innerHTML = isMonth ? '' : `
            <div class="impact-card" style="border-bottom: 3px solid var(--orange)">
                <div class="impact-val" style="color:var(--orange)">${lv1Count}</div>
                <div class="impact-label">Low Condition</div>
            </div>
            <div class="impact-card" style="border-bottom: 3px solid var(--emerald)">
                <div class="impact-val" style="color:var(--emerald)">${lv5Count}</div>
                <div class="impact-label">Peak Condition</div>
            </div>
        `;

        document.getElementById('r-title').textContent = type.toUpperCase();
        document.getElementById('r-keep').value = r.keep||'';
        document.getElementById('r-prob').value = r.prob||'';
        document.getElementById('r-try').value = r.try||'';
        document.getElementById('panel-review').classList.add('open');
    }

    function openSettings() { document.getElementById('panel-settings').classList.add('open'); }
    function closePanel() { document.querySelectorAll('.panel').forEach(p => p.classList.remove('open')); }
    
    function moveWeek(n) { 
        ST.weekStart.setDate(ST.weekStart.getDate() + (n * 7)); 
        renderWeek(); 
        if (ST.tab === 'summary') renderSummary();
        if (ST.tab === 'month') renderMonth();
    }

    function switchTab(t) {
        ST.tab = t;
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(`screen-${t}`).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(b => {
            b.classList.remove('active'); if (b.id === `tab-${t}`) b.classList.add('active');
        });
        refreshTab();
    }

    function refreshTab() {
        if (ST.tab === 'week') renderWeek();
        else if (ST.tab === 'summary') renderSummary();
        else renderMonth();
    }

    function saveDetail() {
        if (ST.data[ST.selDs]?.slots?.[ST.selH]) ST.data[ST.selDs].slots[ST.selH].note = document.getElementById('memo-input').value;
        localStorage.setItem('nimo-v6-matrix-data', JSON.stringify(ST.data));
        closePanel(); refreshTab(); syncToSheets();
    }

    function saveReview() {
        const key = `review-${ST.revType==='wkly'?'w':'m'}-${ds(ST.weekStart)}`;
        ST.data[key] = {
            keep: document.getElementById('r-keep').value,
            prob: document.getElementById('r-prob').value,
            try: document.getElementById('r-try').value
        };
        localStorage.setItem('nimo-v6-matrix-data', JSON.stringify(ST.data));
        closePanel(); syncToSheets();
    }

    function clearData() {
        if (ST.data[ST.selDs]?.slots?.[ST.selH]) {
            delete ST.data[ST.selDs].slots[ST.selH];
            localStorage.setItem('nimo-v6-matrix-data', JSON.stringify(ST.data));
            closePanel(); refreshTab(); syncToSheets();
        }
    }

    function manualSync() { fetchCloudData(); }
</script>
</body>
</html>
